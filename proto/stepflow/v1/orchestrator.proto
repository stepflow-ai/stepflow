syntax = "proto3";

package stepflow.v1;

option go_package = "github.com/datastax/stepflow/proto/stepflow/v1;stepflowv1";

import "google/protobuf/struct.proto";
import "google/protobuf/timestamp.proto";
import "stepflow/v1/common.proto";
import "stepflow/v1/tasks.proto";
import "stepflow/v1/runs.proto";

// Service exposed by the orchestrator for workers to interact with during
// component execution. Workers reach this via `orchestrator_service_url`
// from TaskContext.
//
// This must reach the orchestrator that owns the specific run — it is NOT
// interchangeable with other orchestrators (unlike TasksService).
//
// All RPCs use a consistent error signaling pattern:
//
//   gRPC NOT_FOUND     — the run/task is not on this orchestrator.
//                        The worker should call TasksService.GetOrchestratorForRun
//                        to discover the correct orchestrator and retry.
//
//   gRPC UNAVAILABLE   — the run is being recovered on this orchestrator.
//                        The worker should retry with backoff.
//
// These gRPC-level errors are distinct from task-level status values
// (IN_PROGRESS, ALREADY_CLAIMED) which remain in response bodies.
//
// gRPC only — not exposed as REST.
service OrchestratorService {
  // Submit a sub-flow run from within a component execution.
  //
  // Must reach the orchestrator owning the root run so the sub-flow
  // executor runs in the same process. If `root_run_id` is provided,
  // the orchestrator validates ownership before proceeding.
  //
  // Errors:
  //   NOT_FOUND    — root run not on this orchestrator
  //   UNAVAILABLE  — root run is being recovered
  rpc SubmitRun(OrchestratorSubmitRunRequest) returns (OrchestratorRunStatus);

  // Get the status of a run (optionally waiting for completion).
  //
  // Must reach the orchestrator owning the root run for `wait=true`
  // (completion notifications are local to the owning orchestrator).
  // If `root_run_id` is provided, the orchestrator validates ownership.
  //
  // Errors:
  //   NOT_FOUND    — root run not on this orchestrator
  //   UNAVAILABLE  — root run is being recovered
  rpc GetRun(OrchestratorGetRunRequest) returns (OrchestratorRunStatus);

  // Report task completion (success or failure).
  //
  // Called by workers after executing a component. The worker uses the
  // `orchestrator_service_url` from the task's TaskContext to reach
  // the orchestrator that owns the run.
  //
  // Errors:
  //   NOT_FOUND    — task not on this orchestrator (already completed,
  //                  timed out, or run moved to another orchestrator)
  //   UNAVAILABLE  — run is being recovered, task_id not yet registered
  rpc CompleteTask(CompleteTaskRequest) returns (CompleteTaskResponse);

  // Report that a worker is executing a task (start + heartbeat combined).
  //
  // Called by the worker immediately before beginning component execution
  // and periodically during execution (typically every 1s). Each call
  // resets the crash-detection timer on the orchestrator.
  //
  // On first call (task in Queued phase), transitions the task to
  // Executing and records the worker_id. On subsequent calls, verifies
  // the worker_id matches and resets the heartbeat timer.
  //
  // The response status tells the worker whether to proceed:
  // - IN_PROGRESS: task is yours, continue executing
  // - ALREADY_CLAIMED: a different worker is executing this task, abort
  //
  // Errors:
  //   NOT_FOUND    — task not on this orchestrator
  //   UNAVAILABLE  — run is being recovered, task_id not yet registered
  rpc TaskHeartbeat(TaskHeartbeatRequest) returns (TaskHeartbeatResponse);
}

// --- SubmitRun ---

// Submit a sub-flow run from within a component execution.
// Wraps the shared CreateRunRequest with an optional subflow deduplication key.
message OrchestratorSubmitRunRequest {
  // The run creation parameters (shared with RunsService.CreateRun).
  CreateRunRequest run_request = 1;

  // Deterministic key for subflow deduplication during recovery.
  // When present, the orchestrator will return an existing run with the
  // same key instead of creating a duplicate.
  optional string subflow_key = 2;

  // Root run ID (UUID) for ownership validation.
  // When present, the orchestrator verifies it owns this root run
  // before creating the sub-flow. Returns NOT_FOUND or UNAVAILABLE
  // if the run is not active or is being recovered.
  optional string root_run_id = 3;
}

// --- GetRun ---

message OrchestratorGetRunRequest {
  // Run ID (UUID) to query.
  string run_id = 1;

  // If true, wait for the run to complete before responding.
  bool wait = 2;

  // If true, include item results in the response.
  bool include_results = 3;

  // Result ordering.
  ResultOrder result_order = 4;

  // Maximum seconds to wait when wait=true (default 300).
  optional uint64 timeout_secs = 5;

  // Root run ID (UUID) for ownership validation.
  // When present, the orchestrator verifies it owns this root run
  // before processing the request. Returns NOT_FOUND or UNAVAILABLE
  // if the run is not active or is being recovered.
  optional string root_run_id = 6;
}

// --- Response ---

message OrchestratorRunStatus {
  // Run ID (UUID).
  string run_id = 1;
  string flow_id = 2;
  optional string flow_name = 3;
  ExecutionStatus status = 4;
  ItemStatistics items = 5;
  google.protobuf.Timestamp created_at = 6;
  optional google.protobuf.Timestamp completed_at = 7;
  repeated ItemResult results = 8;

  // Run hierarchy fields.
  // Root run ID (UUID). For top-level runs, equals run_id.
  string root_run_id = 9;
  // Parent run ID (UUID). Present only for sub-flow runs.
  optional string parent_run_id = 10;

  // Journal sequence number of the run creation event.
  uint64 created_at_seqno = 11;
}

// --- CompleteTask ---

// Structured error type for task failures.
// TaskErrorCode is defined in common.proto.
message TaskError {
  // Error code categorizing the failure.
  TaskErrorCode code = 1;

  // Human-readable error message.
  string message = 2;

  // Optional structured error data (stack traces, error context, etc.).
  optional google.protobuf.Struct data = 3;
}

message CompleteTaskRequest {
  // The task ID from the TaskAssignment.
  string task_id = 1;

  // The task result — exactly one must be set.
  oneof result {
    // The component execution response (on success).
    ComponentExecuteResponse response = 2;

    // Structured error (on failure).
    TaskError error = 3;
  }

  // The run ID (UUID) this task belongs to. Used for routing and
  // recovery gating — the orchestrator can check whether the run
  // is still being recovered before returning NOT_FOUND.
  optional string run_id = 4;
}

// Empty response — success is indicated by a non-error gRPC status.
// Task-not-found and run-recovering conditions are returned as gRPC
// NOT_FOUND and UNAVAILABLE errors respectively.
message CompleteTaskResponse {}

// --- TaskHeartbeat ---

// Status of a task from the orchestrator's perspective.
//
// Only used in TaskHeartbeatResponse for task-level state. Orchestrator-level
// conditions (run not found, run recovering) are signaled as gRPC errors
// (NOT_FOUND, UNAVAILABLE) rather than enum values.
enum TaskStatus {
  // Unspecified / default value.
  TASK_STATUS_UNSPECIFIED = 0;

  // Task is in progress — the calling worker owns it.
  TASK_STATUS_IN_PROGRESS = 1;

  // Task is already being executed by a different worker.
  // The calling worker should abort and not call CompleteTask.
  TASK_STATUS_ALREADY_CLAIMED = 2;
}

message TaskHeartbeatRequest {
  // The task ID from the TaskAssignment.
  string task_id = 1;

  // Unique identifier for this worker instance. Must be stable for the
  // duration of a task execution (same ID for start and all heartbeats).
  // Used to detect duplicate task assignments — if a different worker_id
  // sends a heartbeat for the same task, the response indicates
  // ALREADY_CLAIMED.
  string worker_id = 2;

  // Optional progress indicator (0.0 to 1.0).
  optional float progress = 3;

  // Optional human-readable status message.
  optional string status_message = 4;

  // The run ID (UUID) this task belongs to. Used for routing and
  // recovery gating.
  optional string run_id = 5;
}

message TaskHeartbeatResponse {
  // If true, the worker should abort execution of this task.
  // Check `status` for the reason.
  bool should_abort = 1;

  // Current task status from the orchestrator's perspective.
  TaskStatus status = 2;
}
