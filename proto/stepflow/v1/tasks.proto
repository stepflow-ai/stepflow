syntax = "proto3";

package stepflow.v1;

option go_package = "github.com/datastax/stepflow/proto/stepflow/v1;stepflowv1";

import "google/protobuf/struct.proto";
import "stepflow/v1/common.proto";

// Orchestrator-hosted service that workers connect to for receiving tasks.
//
// This service runs on the orchestrator (or any stateless dispatcher with
// access to the task queue). Workers are *clients* of this service — they
// call PullTasks to receive work.
//
// Static worker configuration (blob service URL, blobification threshold,
// etc.) is provided via environment variables at deployment time. Only
// per-task information (e.g., the run-owning orchestrator URL) is sent
// in-band via TaskContext.
//
// Workers report task completion via OrchestratorService.CompleteTask,
// which must reach the orchestrator that owns the specific run (URL
// provided per-task in TaskContext).
//
// gRPC only — not exposed as REST.
service TasksService {
  // Pull task assignments for a specific plugin.
  //
  // The worker specifies which plugin entry it is pulling for (by name from
  // the orchestrator's config). The orchestrator validates that the plugin
  // uses a compatible transport (e.g., "pull"). If the plugin uses a
  // queue-based transport (e.g., NATS, Kafka), this RPC returns FAILED_PRECONDITION.
  //
  // The worker declares its concurrency limit. The stream stays open for
  // the worker's lifetime — tasks are sent as they become available.
  // Component discovery happens via ListComponentsRequest tasks sent
  // through the stream, not at connection time.
  rpc PullTasks(PullTasksRequest) returns (stream TaskAssignment);

  // Look up the current orchestrator for a run.
  //
  // Workers call this when they cannot reach the orchestrator URL from
  // their TaskContext (e.g., after an orchestrator restart or run migration).
  // Any orchestrator can answer this — it performs a stateless lease lookup.
  //
  // Returns the gRPC service URL of the orchestrator that currently owns
  // the run, or NOT_FOUND if no active lease exists.
  rpc GetOrchestratorForRun(GetOrchestratorForRunRequest) returns (GetOrchestratorForRunResponse);
}

// =============================================================================
// Task context (per-task metadata for worker callbacks)
// =============================================================================

// Per-task context sent with each TaskAssignment.
//
// Contains the orchestrator URL that the worker needs for callbacks
// (CompleteTask, SubmitRun, GetRun). This URL identifies the orchestrator
// that owns the specific run — it may differ per task in multi-orchestrator
// deployments.
//
// Static configuration (blob URL, thresholds, etc.) is provided via
// environment variables at deployment time, not per-task.
message TaskContext {
  // gRPC endpoint for OrchestratorService (submit_run, get_run, complete_task).
  // Must reach the orchestrator that owns the current run.
  string orchestrator_service_url = 1;

  // Root run ID (UUID) for this execution tree.
  // For top-level runs, equals the task's run_id.
  // For sub-flows, this is the original run that started the tree.
  // Workers include this in OrchestratorService requests so the
  // orchestrator can validate it owns the root execution.
  string root_run_id = 2;
}

// =============================================================================
// Component messages
// =============================================================================

// --- ListComponents ---

message ListComponentsRequest {}

message ListComponentsResponse {
  repeated ComponentInfo components = 1;
}

// Information about a single component.
message ComponentInfo {
  // Component path (e.g., "my_function", "transform/clean").
  string name = 1;

  // Human-readable description.
  optional string description = 2;

  // JSON Schema for the component's expected input, encoded as JSON string.
  optional string input_schema = 3;

  // JSON Schema for the component's output, encoded as JSON string.
  optional string output_schema = 4;
}

// --- GetComponentInfo ---

message ComponentInfoRequest {
  // Component path to get info for.
  string component = 1;
}

message ComponentInfoResponse {
  ComponentInfo info = 1;
}

// --- ExecuteComponent ---

message ComponentExecuteRequest {
  // Component path to execute (e.g., "my_function").
  string component = 1;

  // Input data for the component.
  google.protobuf.Value input = 2;

  // Execution attempt number (1-based, monotonically increasing).
  // Increments on transport errors, component retries, or orchestrator recovery.
  // Components can use this for idempotency guards.
  uint32 attempt = 3;

  // Observability context for tracing and logging.
  ObservabilityContext observability = 4;
}

message ComponentExecuteResponse {
  // Output data from the component.
  google.protobuf.Value output = 1;
}

// =============================================================================
// Task dispatch (PullTasks)
// =============================================================================

message PullTasksRequest {
  // Queue name matching the plugin's key in the orchestrator config (e.g., "python").
  // The orchestrator uses this to route tasks to the correct worker pool.
  // Set via STEPFLOW_QUEUE_NAME environment variable on the worker.
  string queue_name = 1;

  // Maximum concurrent tasks this worker can accept.
  // The orchestrator will not exceed this limit for this worker.
  int32 max_concurrent = 2;

  // Worker-assigned unique identifier (UUID).
  // Used for logging and diagnostics on the orchestrator side. This is the
  // same ID the worker sends in TaskHeartbeatRequest.worker_id, allowing
  // correlation between PullTasks connections and heartbeat/completion RPCs.
  // Optional — if empty, the orchestrator assigns an opaque internal ID
  // for logging.
  string worker_id = 3;
}

// A task dispatched to a worker for execution or discovery.
//
// For queue-based transports (NATS JetStream, etc.), workers should
// acknowledge the queue message immediately upon receipt — before
// calling TaskHeartbeat or executing the component. The orchestrator
// is the single source of truth for task lifecycle; queue-level
// redelivery would conflict with the orchestrator's timeout and retry
// tracking. See the ack semantics documentation in the NATS transport.
message TaskAssignment {
  // Unique ID for this task assignment.
  // Used to correlate completion reports with assignments.
  string task_id = 1;

  // The task to perform — either a component execution or a discovery request.
  oneof task {
    // Execute a component.
    ComponentExecuteRequest execute = 2;

    // List available components. Workers respond via CompleteTask with
    // a ListComponentsResult containing their available components.
    ListComponentsRequest list_components = 3;
  }

  // Per-task context for worker callbacks (CompleteTask, SubmitRun, etc.).
  // Contains the orchestrator URL that owns the current run.
  TaskContext context = 4;

  // Queue timeout in seconds: maximum time the orchestrator will wait
  // for the worker to call TaskHeartbeat after receiving this assignment.
  // If the worker does not call TaskHeartbeat within this window, the
  // orchestrator treats the task as lost in the queue.
  // 0 means no queue timeout.
  uint32 deadline_secs = 5;

  // Suggested heartbeat interval in seconds. The worker should send
  // TaskHeartbeat at this cadence after calling TaskHeartbeat. The
  // orchestrator uses a 5s crash-detection timeout — if no heartbeat
  // or CompleteTask arrives within 5s, the task is treated as failed.
  // 0 means no heartbeating required.
  uint32 heartbeat_interval_secs = 6;

  // Optional execution timeout in seconds: maximum time from first
  // TaskHeartbeat to CompleteTask. 0 means no execution timeout.
  uint32 execution_timeout_secs = 7;
}

// CompleteTaskRequest and CompleteTaskResponse live in orchestrator.proto
// because task completion must reach the orchestrator that owns the run,
// not necessarily the orchestrator that dispatched the task.

// =============================================================================
// GetOrchestratorForRun (orchestrator discovery)
// =============================================================================

message GetOrchestratorForRunRequest {
  // Run ID (UUID) to look up the owning orchestrator for.
  string run_id = 1;
}

message GetOrchestratorForRunResponse {
  // The gRPC service URL for the orchestrator currently owning this run.
  // Workers should use this URL for OrchestratorService calls (CompleteTask,
  // SubmitRun, GetRun, TaskHeartbeat).
  string orchestrator_service_url = 1;
}
