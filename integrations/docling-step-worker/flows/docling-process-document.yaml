schema: https://stepflow.org/schemas/v1/flow.json
name: docling-process-document
description: Classify, convert, and chunk a document using Docling

schemas:
  type: object
  properties:
    input:
      type: object
      required:
        - source
        - source_kind
      properties:
        source:
          type: string
          description: "Document source: blob ref, URL, or base64-encoded content"
        source_kind:
          type: string
          enum: [blob, url, base64]
          description: How to interpret the source field
        to_formats:
          type: array
          items:
            type: string
          description: "Export formats: markdown, html, text, json, doctags (default: [markdown])"
        image_export_mode:
          type: string
          enum: [embedded, placeholder, referenced]
          description: Image reference mode for markdown/html exports (default: embedded)
        chunk_options:
          type: object
          description: Optional chunking configuration
          properties:
            max_tokens:
              type: integer
              description: Maximum tokens per chunk
            tokenizer:
              type: string
              description: Tokenizer to use for chunk sizing
    output:
      type: object
      properties:
        document:
          type: object
          description: ExportDocumentResponse with rendered content fields (md_content, html_content, etc.)
        chunks:
          type: array
          description: Document chunks produced by HybridChunker
        classification:
          type: object
          description: Classification result with document type and recommended config

steps:
  - id: classify
    component: /docling/classify
    input:
      source: { $input: "source" }
      source_kind: { $input: "source_kind" }

  - id: convert
    component: /docling/convert
    input:
      source: { $input: "source" }
      source_kind: { $input: "source_kind" }
      pipeline_config: { $step: "classify", path: "recommended_config" }
      to_formats: { $input: "to_formats" }
      image_export_mode: { $input: "image_export_mode" }

  - id: chunk
    component: /docling/chunk
    input:
      document: { $step: "convert", path: "document_dict" }
      chunk_options: { $input: "chunk_options" }

output:
  document: { $step: "convert", path: "document" }
  chunks: { $step: "chunk", path: "chunks" }
  classification: { $step: "classify" }
