schema: https://stepflow.org/schemas/v1/flow.json
name: docling-e2e-test
description: End-to-end test for the docling step worker pipeline

schemas:
  type: object
  properties:
    input:
      type: object
      required:
        - source
        - source_kind
      properties:
        source:
          type: string
          description: Base64-encoded PDF content
        source_kind:
          type: string
          enum: [base64]
    output:
      type: object
      properties:
        document:
          type: object
        chunks:
          type: array
        classification:
          type: object

steps:
  - id: classify
    component: /docling/classify
    input:
      source: { $input: "source" }
      source_kind: { $input: "source_kind" }

  - id: convert
    component: /docling/convert
    input:
      source: { $input: "source" }
      source_kind: { $input: "source_kind" }
      pipeline_config: { $step: "classify", path: "recommended_config" }

  - id: chunk
    component: /docling/chunk
    input:
      document: { $step: "convert", path: "document" }

output:
  document: { $step: "convert", path: "document" }
  chunks: { $step: "chunk", path: "chunks" }
  classification: { $step: "classify" }

test:
  config:
    plugins:
      builtin:
        type: builtin
      docling:
        type: stepflow
        command: uv
        args: ["run", "--project", "../..", "docling-step-worker-server"]
        healthCheck:
          path: /health
          timeoutMs: 120000
          retryDelayMs: 2000

    routes:
      "/builtin/{component}":
        - plugin: builtin
      "/docling/{component}":
        - plugin: docling

  cases:
    - name: "Process a simple PDF through classify, convert, and chunk"
      input:
        source: ""
        source_kind: "base64"
      output:
        outcome: success
        result:
          classification:
            format: "pdf"
            has_text_layer: true
            recommended_config: "born_digital"
