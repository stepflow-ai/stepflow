components:
    schemas:
        BuildInfo:
            type: object
            properties:
                gitVersion:
                    type: string
                    description: |-
                        Git version string from `git describe --tags`. Returns the tag name
                         if HEAD is tagged (e.g., "v0.11.0"), otherwise "tag-N-gSHORTHASH"
                         (e.g., "v0.11.0-3-gabcdef1"). Falls back to the short commit hash
                         if no tags exist.
                dirty:
                    type: boolean
                    description: True if the working tree had uncommitted changes at build time.
                rustcVersion:
                    type: string
                    description: Rust compiler version (e.g., "1.82.0").
                profile:
                    type: string
                    description: Build profile (e.g., "debug" or "release").
                features:
                    type: array
                    items:
                        type: string
                    description: Cargo features enabled at build time.
                target:
                    type: string
                    description: Target architecture (e.g., "aarch64-apple-darwin").
            description: Build-time metadata embedded in the service binary.
        CancelRunResponse:
            type: object
            properties:
                summary:
                    $ref: '#/components/schemas/RunSummary'
        ComponentInfoEntry:
            type: object
            properties:
                component:
                    type: string
                    description: Component path (e.g., "/builtin/openai", "/python/my_func").
                description:
                    type: string
                    description: Optional human-readable description.
                inputSchema:
                    type: object
                    description: JSON Schema for the component's input (null if schemas not requested).
                outputSchema:
                    type: object
                    description: JSON Schema for the component's output (null if schemas not requested).
            description: A component registered with the orchestrator.
        CreateRunRequest:
            type: object
            properties:
                flowId:
                    type: string
                    description: Flow blob ID to execute.
                input:
                    type: array
                    items:
                        $ref: '#/components/schemas/GoogleProtobufValue'
                    description: Input data — one element per item (batch mode).
                overrides:
                    type: object
                    description: |-
                        Workflow overrides to apply (JSON Merge Patch per step).
                         Keys are step IDs, values are override objects.
                variables:
                    type: object
                    additionalProperties:
                        $ref: '#/components/schemas/GoogleProtobufValue'
                    description: Variables for variable references in the workflow.
                maxConcurrency:
                    type: integer
                    description: Maximum concurrent item executions.
                    format: uint32
                wait:
                    type: boolean
                    description: If true, block until the run completes.
                timeoutSecs:
                    type: string
                    description: Maximum seconds to wait when wait=true (default 300).
            description: |-
                Shared run creation parameters used by both RunsService.CreateRun (REST/gRPC)
                 and OrchestratorService.SubmitRun (worker callback for sub-flows).
        CreateRunResponse:
            type: object
            properties:
                summary:
                    allOf:
                        - $ref: '#/components/schemas/RunSummary'
                    description: Run summary.
                results:
                    type: array
                    items:
                        $ref: '#/components/schemas/ItemResult'
                    description: Item results, populated when wait=true and the run completed.
            description: |-
                Response for create run.

                 The summary fields are included directly (not nested) to match the existing
                 REST API's flattened JSON shape. tonic-rest serializes this as a flat object
                 where RunSummary fields appear at the top level alongside `results`.
        DeleteFlowResponse:
            type: object
            properties: {}
        DeleteRunResponse:
            type: object
            properties: {}
        Diagnostic:
            type: object
            properties:
                kind:
                    type: string
                    description: Diagnostic kind name (camelCase identifier).
                code:
                    type: integer
                    description: Numeric error code.
                    format: uint32
                level:
                    enum:
                        - DIAGNOSTIC_LEVEL_UNSPECIFIED
                        - DIAGNOSTIC_LEVEL_FATAL
                        - DIAGNOSTIC_LEVEL_ERROR
                        - DIAGNOSTIC_LEVEL_WARNING
                    type: string
                    description: Severity level.
                    format: enum
                formatted:
                    type: string
                    description: Human-readable formatted message.
                data:
                    allOf:
                        - $ref: '#/components/schemas/GoogleProtobufValue'
                    description: Structured data with additional context (null if no data).
                path:
                    type: string
                    description: JSON path to the field with the issue (e.g., "$.steps[0].input").
                experimental:
                    type: boolean
                    description: Whether this diagnostic is experimental (may have false positives).
            description: A single validation diagnostic.
        Diagnostics:
            type: object
            properties:
                diagnostics:
                    type: array
                    items:
                        $ref: '#/components/schemas/Diagnostic'
                    description: All diagnostics found during validation.
                numFatal:
                    type: integer
                    description: Count of fatal-level diagnostics (flow cannot be executed).
                    format: uint32
                numError:
                    type: integer
                    description: Count of error-level diagnostics.
                    format: uint32
                numWarning:
                    type: integer
                    description: Count of warning-level diagnostics.
                    format: uint32
            description: Validation results from analyzing a flow definition.
        ExampleInput:
            type: object
            properties:
                name:
                    type: string
                    description: Display name of the example.
                description:
                    type: string
                    description: Optional description of what this example demonstrates.
                input:
                    allOf:
                        - $ref: '#/components/schemas/GoogleProtobufValue'
                    description: The input data for this example.
            description: An example input for a flow (from `examples` or `tests` sections).
        FlowVariable:
            type: object
            properties:
                description:
                    type: string
                    description: Human-readable description.
                defaultValue:
                    allOf:
                        - $ref: '#/components/schemas/GoogleProtobufValue'
                    description: Default value for the variable.
                required:
                    type: boolean
                    description: Whether the variable is required.
                schema:
                    type: object
                    description: JSON Schema for this variable's expected value.
                envVar:
                    type: string
                    description: Environment variable name that populates this variable.
            description: Definition of a single flow variable.
        GetBlobResponse:
            type: object
            properties:
                jsonData:
                    allOf:
                        - $ref: '#/components/schemas/GoogleProtobufValue'
                    description: JSON data (for data and flow blobs).
                rawData:
                    type: string
                    description: Raw binary data (for binary blobs).
                    format: bytes
                blobType:
                    type: string
                    description: The blob type.
                blobId:
                    type: string
                    description: The blob ID (for confirmation).
                filename:
                    type: string
                    description: Filename if one was set.
                contentType:
                    type: string
                    description: MIME content type (e.g., "application/pdf"). Present for binary blobs.
        GetFlowResponse:
            type: object
            properties:
                flow:
                    type: object
                    description: The flow definition.
                flowId:
                    type: string
                    description: The flow blob ID.
                allExamples:
                    type: array
                    items:
                        $ref: '#/components/schemas/ExampleInput'
                    description: All available examples (includes both examples and test cases).
        GetFlowVariablesResponse:
            type: object
            properties:
                flowId:
                    type: string
                    description: The flow blob ID.
                variables:
                    type: object
                    additionalProperties:
                        $ref: '#/components/schemas/FlowVariable'
                    description: |-
                        Variable definitions keyed by variable name.
                         Each variable includes its schema, description, default, and env_var mapping.
        GetRunFlowResponse:
            type: object
            properties:
                flow:
                    type: object
                flowId:
                    type: string
        GetRunItemsResponse:
            type: object
            properties:
                results:
                    type: array
                    items:
                        $ref: '#/components/schemas/ItemResult'
        GetRunResponse:
            type: object
            properties:
                summary:
                    $ref: '#/components/schemas/RunSummary'
                steps:
                    type: array
                    items:
                        $ref: '#/components/schemas/StepStatus'
        GetRunStepsResponse:
            type: object
            properties:
                steps:
                    type: array
                    items:
                        $ref: '#/components/schemas/StepStatus'
        GetStepDetailResponse:
            type: object
            properties:
                step:
                    $ref: '#/components/schemas/StepStatus'
        GoogleProtobufAny:
            type: object
            properties:
                '@type':
                    type: string
                    description: The type of the serialized message.
            additionalProperties: true
            description: Contains an arbitrary serialized message along with a @type that describes the type of the serialized message.
        GoogleProtobufValue:
            description: Represents a dynamically typed value which can be either null, a number, a string, a boolean, a recursive struct value, or a list of values.
        HealthCheckResponse:
            type: object
            properties:
                status:
                    type: string
                    description: Service status (e.g., "healthy").
                timestamp:
                    type: string
                    description: Timestamp when health was checked.
                    format: date-time
                build:
                    allOf:
                        - $ref: '#/components/schemas/BuildInfo'
                    description: Build metadata for the running service.
        ItemCompletedEvent:
            type: object
            properties:
                runId:
                    type: string
                    description: Run ID (UUID).
                itemIndex:
                    type: integer
                    format: uint32
                result:
                    allOf:
                        - $ref: '#/components/schemas/GoogleProtobufValue'
                    description: The item result. Only included when include_results=true.
        ItemResult:
            type: object
            properties:
                itemIndex:
                    type: integer
                    description: Index of this item in the input array (0-based).
                    format: uint32
                status:
                    enum:
                        - EXECUTION_STATUS_UNSPECIFIED
                        - EXECUTION_STATUS_RUNNING
                        - EXECUTION_STATUS_COMPLETED
                        - EXECUTION_STATUS_FAILED
                        - EXECUTION_STATUS_CANCELLED
                        - EXECUTION_STATUS_PAUSED
                        - EXECUTION_STATUS_RECOVERY_FAILED
                    type: string
                    description: Execution status of this item.
                    format: enum
                output:
                    allOf:
                        - $ref: '#/components/schemas/GoogleProtobufValue'
                    description: Result of this item (present when completed successfully).
                errorMessage:
                    type: string
                    description: Error message (present when failed).
                errorCode:
                    type: integer
                    description: Error code (present when failed).
                    format: int32
                completedAt:
                    type: string
                    description: When this item completed.
                    format: date-time
            description: Result of a single item in a run.
        ItemStatistics:
            type: object
            properties:
                total:
                    type: integer
                    format: uint32
                completed:
                    type: integer
                    format: uint32
                running:
                    type: integer
                    format: uint32
                failed:
                    type: integer
                    format: uint32
                cancelled:
                    type: integer
                    format: uint32
            description: Aggregate statistics for items in a run.
        ListRegisteredComponentsResponse:
            type: object
            properties:
                components:
                    type: array
                    items:
                        $ref: '#/components/schemas/ComponentInfoEntry'
                    description: All available components, sorted by name.
        ListRunsResponse:
            type: object
            properties:
                runs:
                    type: array
                    items:
                        $ref: '#/components/schemas/RunSummary'
        PutBlobRequest:
            type: object
            properties:
                jsonData:
                    allOf:
                        - $ref: '#/components/schemas/GoogleProtobufValue'
                    description: JSON data (for data and flow blobs).
                rawData:
                    type: string
                    description: Raw binary data (for binary blobs, images, PDFs, etc.).
                    format: bytes
                blobType:
                    type: string
                    description: 'Blob type: "data", "flow", or "binary".'
                filename:
                    type: string
                    description: Optional filename to associate with the blob.
                contentType:
                    type: string
                    description: MIME content type (e.g., "application/pdf"). Used with raw_data.
        PutBlobResponse:
            type: object
            properties:
                blobId:
                    type: string
                    description: Content-based blob ID (SHA-256 hash).
                filename:
                    type: string
                    description: Filename if one was provided.
        RunCompletedEvent:
            type: object
            properties:
                runId:
                    type: string
                    description: Run ID (UUID).
                status:
                    enum:
                        - EXECUTION_STATUS_UNSPECIFIED
                        - EXECUTION_STATUS_RUNNING
                        - EXECUTION_STATUS_COMPLETED
                        - EXECUTION_STATUS_FAILED
                        - EXECUTION_STATUS_CANCELLED
                        - EXECUTION_STATUS_PAUSED
                        - EXECUTION_STATUS_RECOVERY_FAILED
                    type: string
                    format: enum
        RunCreatedEvent:
            type: object
            properties:
                runId:
                    type: string
                    description: Run ID (UUID).
                flowId:
                    type: string
                itemCount:
                    type: integer
                    format: uint32
        RunSummary:
            type: object
            properties:
                runId:
                    type: string
                    description: Run ID (UUID).
                flowId:
                    type: string
                flowName:
                    type: string
                status:
                    enum:
                        - EXECUTION_STATUS_UNSPECIFIED
                        - EXECUTION_STATUS_RUNNING
                        - EXECUTION_STATUS_COMPLETED
                        - EXECUTION_STATUS_FAILED
                        - EXECUTION_STATUS_CANCELLED
                        - EXECUTION_STATUS_PAUSED
                        - EXECUTION_STATUS_RECOVERY_FAILED
                    type: string
                    format: enum
                items:
                    $ref: '#/components/schemas/ItemStatistics'
                createdAt:
                    type: string
                    format: date-time
                completedAt:
                    type: string
                    format: date-time
                rootRunId:
                    type: string
                    description: |-
                        Run hierarchy fields.
                         Root run ID (UUID). For top-level runs, equals run_id.
                parentRunId:
                    type: string
                    description: Parent run ID (UUID). Present only for sub-flow runs.
                orchestratorId:
                    type: string
                    description: The orchestrator currently managing this run.
                createdAtSeqno:
                    type: string
                    description: Journal sequence numbers for recovery and consistency.
                finishedAtSeqno:
                    type: string
        Status:
            type: object
            properties:
                code:
                    type: integer
                    description: The status code, which should be an enum value of [google.rpc.Code][google.rpc.Code].
                    format: int32
                message:
                    type: string
                    description: A developer-facing error message, which should be in English. Any user-facing error message should be localized and sent in the [google.rpc.Status.details][google.rpc.Status.details] field, or localized by the client.
                details:
                    type: array
                    items:
                        $ref: '#/components/schemas/GoogleProtobufAny'
                    description: A list of messages that carry the error details.  There is a common set of message types for APIs to use.
            description: 'The `Status` type defines a logical error model that is suitable for different programming environments, including REST APIs and RPC APIs. It is used by [gRPC](https://github.com/grpc). Each `Status` message contains three pieces of data: error code, error message, and error details. You can find out more about this error model and how to work with it in the [API Design Guide](https://cloud.google.com/apis/design/errors).'
        StatusEvent:
            type: object
            properties:
                sequenceNumber:
                    type: string
                    description: Journal sequence number (used as SSE id).
                timestamp:
                    type: string
                    description: Timestamp when this event was recorded.
                    format: date-time
                runCreated:
                    $ref: '#/components/schemas/RunCreatedEvent'
                stepStarted:
                    $ref: '#/components/schemas/StepStartedEvent'
                stepCompleted:
                    $ref: '#/components/schemas/StepCompletedEvent'
                stepReady:
                    $ref: '#/components/schemas/StepReadyEvent'
                itemCompleted:
                    $ref: '#/components/schemas/ItemCompletedEvent'
                runCompleted:
                    $ref: '#/components/schemas/RunCompletedEvent'
                subRunCreated:
                    $ref: '#/components/schemas/SubRunCreatedEvent'
                stepsNeeded:
                    $ref: '#/components/schemas/StepsNeededEvent'
            description: |-
                A status event from the execution journal.

                 Sent as SSE events with:
                 - id = sequence_number
                 - event = the event type name (e.g., "step_started")
                 - data = JSON-serialized StatusEvent
        StepCompletedEvent:
            type: object
            properties:
                runId:
                    type: string
                    description: Run ID (UUID).
                itemIndex:
                    type: integer
                    format: uint32
                stepIndex:
                    type: integer
                    format: uint32
                stepId:
                    type: string
                status:
                    enum:
                        - EXECUTION_STATUS_UNSPECIFIED
                        - EXECUTION_STATUS_RUNNING
                        - EXECUTION_STATUS_COMPLETED
                        - EXECUTION_STATUS_FAILED
                        - EXECUTION_STATUS_CANCELLED
                        - EXECUTION_STATUS_PAUSED
                        - EXECUTION_STATUS_RECOVERY_FAILED
                    type: string
                    description: Whether the step succeeded or failed.
                    format: enum
                result:
                    allOf:
                        - $ref: '#/components/schemas/GoogleProtobufValue'
                    description: The step result. Only included when include_results=true.
        StepReadyEvent:
            type: object
            properties:
                runId:
                    type: string
                    description: Run ID (UUID).
                itemIndex:
                    type: integer
                    format: uint32
                stepIndex:
                    type: integer
                    format: uint32
                stepId:
                    type: string
        StepStartedEvent:
            type: object
            properties:
                runId:
                    type: string
                    description: Run ID (UUID).
                itemIndex:
                    type: integer
                    format: uint32
                stepIndex:
                    type: integer
                    format: uint32
                stepId:
                    type: string
                attempt:
                    type: integer
                    description: Execution attempt number (1-based, >1 for retries).
                    format: uint32
        StepStatus:
            type: object
            properties:
                stepId:
                    type: string
                stepIndex:
                    type: integer
                    format: uint32
                itemIndex:
                    type: integer
                    description: Item index (0-based). Required for batch runs.
                    format: uint32
                status:
                    enum:
                        - EXECUTION_STATUS_UNSPECIFIED
                        - EXECUTION_STATUS_RUNNING
                        - EXECUTION_STATUS_COMPLETED
                        - EXECUTION_STATUS_FAILED
                        - EXECUTION_STATUS_CANCELLED
                        - EXECUTION_STATUS_PAUSED
                        - EXECUTION_STATUS_RECOVERY_FAILED
                    type: string
                    format: enum
                component:
                    type: string
                output:
                    allOf:
                        - $ref: '#/components/schemas/GoogleProtobufValue'
                    description: Step result (present when completed or failed).
                errorMessage:
                    type: string
                errorCode:
                    type: integer
                    format: int32
                startedAt:
                    type: string
                    format: date-time
                completedAt:
                    type: string
                    format: date-time
                journalSeqno:
                    type: string
                    description: Journal sequence number of the event that produced this status.
                updatedAt:
                    type: string
                    description: When this status was last updated.
                    format: date-time
        StepsNeededEvent:
            type: object
            properties:
                runId:
                    type: string
                    description: Run ID (UUID).
                itemIndex:
                    type: integer
                    description: Item index (0-based).
                    format: uint32
                stepIds:
                    type: array
                    items:
                        type: string
                    description: |-
                        Step IDs that need to execute for this item.
                         Emitted after flow analysis and whenever conditional branches change the
                         needed step set.
        StoreFlowRequest:
            type: object
            properties:
                flow:
                    type: object
                    description: The flow definition as JSON.
                dryRun:
                    type: boolean
                    description: If true, only validate the flow without storing it.
        StoreFlowResponse:
            type: object
            properties:
                flowId:
                    type: string
                    description: Content-based flow ID (SHA-256 hash). Always present, even for dry runs.
                stored:
                    type: boolean
                    description: |-
                        Whether the flow was actually stored.
                         False when dry_run=true or when validation has fatal diagnostics.
                diagnostics:
                    allOf:
                        - $ref: '#/components/schemas/Diagnostics'
                    description: Validation diagnostics (warnings, errors, fatals).
        SubRunCreatedEvent:
            type: object
            properties:
                runId:
                    type: string
                    description: The sub-run's ID (UUID).
                parentRunId:
                    type: string
                    description: Parent run ID (UUID) that spawned this sub-run.
                flowId:
                    type: string
                    description: The flow being executed by the sub-run.
                itemCount:
                    type: integer
                    description: Number of items in the sub-run.
                    format: uint32
tags:
    - name: BlobService
      description: |-
        Content-addressed blob storage service.

         Exposed as both REST (for external clients) and gRPC (for workers via
         `blob_service_url` environment variable). Workers can call any
         orchestrator or a dedicated blob pool for these operations.

         The REST layer supports content negotiation:
         - `application/json`: JSON-encoded blob data
         - `application/octet-stream`: Raw binary data (with `X-Blob-Filename` header)

         The gRPC layer uses `oneof` to carry either JSON or raw bytes efficiently.
    - name: ComponentsService
      description: |-
        Service for listing registered components across all plugins.

         This is the external REST/gRPC API for clients to discover available
         components. It aggregates results from all registered plugins. For the
         internal task dispatch API, see TasksService in tasks.proto.
    - name: FlowsService
      description: Service for managing workflow (flow) definitions.
    - name: HealthService
      description: Service health check endpoint.
    - name: RunsService
      description: Service for managing workflow runs.
