[package]
name = "stepflow-isolation-proxy"
version.workspace = true
edition.workspace = true
license.workspace = true
authors.workspace = true
repository.workspace = true
homepage.workspace = true
description = "Stepflow isolation proxy — dispatches tasks to sandboxed workers via vsock"

[[bin]]
name = "stepflow-isolation-proxy"
path = "src/main.rs"

[dependencies]
# Stepflow
stepflow-proto = { workspace = true, features = ["tokio"] }

# Async runtime
tokio = { workspace = true, features = ["full"] }

# CLI
clap.workspace = true

# HTTP client (for Firecracker API over Unix socket)
hyper.workspace = true
hyper-util.workspace = true
http-body-util.workspace = true

# gRPC
tonic.workspace = true

# Serialization
serde_json.workspace = true

# Logging
log.workspace = true
env_logger.workspace = true

# Error handling
thiserror.workspace = true

# Utilities
uuid = { workspace = true, features = ["v4"] }

# NOTE: The integration test (disabled-tests/integration.rs) depends on
# stepflow-client and stepflow-worker from sdks/rust/, which live in a
# separate workspace. It is kept in disabled-tests/ to avoid cargo
# auto-discovery. See .github/actions/firecracker-checks/action.yml.
