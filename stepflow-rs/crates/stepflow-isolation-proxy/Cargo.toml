[package]
name = "stepflow-isolation-proxy"
version.workspace = true
edition.workspace = true
license.workspace = true
authors.workspace = true
repository.workspace = true
homepage.workspace = true
description = "Stepflow isolation proxy — dispatches tasks to sandboxed workers via vsock"

[[bin]]
name = "stepflow-isolation-proxy"
path = "src/main.rs"

[dependencies]
# Stepflow
stepflow-worker = { path = "../../../sdks/rust/crates/stepflow-worker" }
stepflow-proto.workspace = true

# Async runtime
tokio = { workspace = true, features = ["full"] }

# CLI
clap.workspace = true

# HTTP client (for Firecracker API over Unix socket)
hyper.workspace = true
hyper-util.workspace = true
http-body-util.workspace = true

# Serialization
serde_json.workspace = true

# Logging
log.workspace = true
env_logger.workspace = true

# Error handling
thiserror.workspace = true

# Utilities
uuid = { workspace = true, features = ["v4"] }

[dev-dependencies]
stepflow-client = { path = "../../../sdks/rust/crates/stepflow-client", features = ["local-server"] }
tracing-subscriber.workspace = true

[[test]]
name = "integration"
path = "tests/integration.rs"
