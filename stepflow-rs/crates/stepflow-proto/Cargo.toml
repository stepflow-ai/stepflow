[package]
name = "stepflow-proto"
description = "Generated protobuf types and gRPC service definitions for Stepflow"
version.workspace = true
edition.workspace = true
authors.workspace = true
license.workspace = true
homepage.workspace = true
repository.workspace = true

[features]
default = []
tokio = ["dep:tokio"]

[dependencies]
prost = "0.14"
prost-types = "0.14"
prost-wkt-types = "0.7"
schemars.workspace = true
serde = { version = "1", features = ["derive"] }
tokio = { version = "1", features = ["io-util"], optional = true }
tonic = { version = "0.14", features = ["transport"] }
tonic-prost = "0.14"

[dev-dependencies]
tokio = { version = "1", features = ["macros", "rt"] }

[build-dependencies]
dunce = "1"
prost-build = "0.14"
tonic-prost-build = "0.14"
tonic-rest-build = "0.1.5"

[lints]
workspace = true

[package.metadata.cargo-machete]
# prost/prost-types/prost-wkt-types/tonic-prost/schemars/serde: used in protobuf-generated
#   code loaded via include!() — machete cannot see through macros.
# prost-build/tonic-prost-build/tonic-rest-build/dunce: build-time deps used in build.rs.
ignored = ["prost", "prost-types", "prost-wkt-types", "tonic-prost", "schemars", "serde", "tokio", "prost-build", "tonic-prost-build", "tonic-rest-build", "dunce",]
