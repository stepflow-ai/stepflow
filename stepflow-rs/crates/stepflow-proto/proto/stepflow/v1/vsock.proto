syntax = "proto3";

package stepflow.v1;

option go_package = "github.com/datastax/stepflow/proto/stepflow/v1;stepflowv1";

import "stepflow/v1/tasks.proto";

// Envelope for dispatching tasks over vsock (or Unix socket) to workers
// running inside Firecracker microVMs.
//
// The proxy reads TaskAssignment from the orchestrator's PullTasks stream
// and wraps it in this envelope with additional environment URLs that the
// VM worker needs for direct communication with the orchestrator.
//
// Wire format: sequential length-delimited messages on a single connection.
// Each message is [4-byte big-endian length][protobuf VsockTaskEnvelope].
// End-of-stream (connection closed) means no more tasks.
message VsockTaskEnvelope {
  // The task assignment from the orchestrator.
  TaskAssignment assignment = 1;

  // Blob API URL for the worker to store/retrieve blobs.
  // e.g., "http://orchestrator:7840/api/v1/blobs"
  string blob_url = 2;

  // Tasks service URL (for GetOrchestratorForRun discovery).
  // e.g., "http://orchestrator:7837"
  string tasks_url = 3;

  // OpenTelemetry collector endpoint for traces, metrics, and logs.
  // e.g., "http://otel-collector:4317"
  string otel_endpoint = 4;
}
