[package]
name = "stepflow-grpc"
description = "gRPC protocol definitions and services for Stepflow"
version.workspace = true
edition.workspace = true
authors.workspace = true
license.workspace = true
homepage.workspace = true
repository.workspace = true

[dependencies]
axum.workspace = true
chrono.workspace = true
error-stack.workspace = true
fastrace.workspace = true
futures.workspace = true
log.workspace = true
prost-wkt-types = "0.7"
schemars.workspace = true
serde = { version = "1", features = ["derive"] }
dashmap.workspace = true
serde_json.workspace = true
stepflow-analysis.workspace = true
stepflow-core.workspace = true
stepflow-proto.workspace = true
stepflow-observability.workspace = true
stepflow-domain.workspace = true
stepflow-execution.workspace = true
stepflow-plugin.workspace = true
stepflow-state.workspace = true
tokio.workspace = true
tokio-stream.workspace = true
tokio-util = { workspace = true, features = ["time"] }
tonic = { version = "0.14", features = ["transport"] }
tonic-types = "0.14"
tonic-rest = "0.1.5"
uuid.workspace = true

[target.'cfg(unix)'.dependencies]
nix.workspace = true

[dev-dependencies]
prost-wkt-types = "0.7"
serde_json.workspace = true
stepflow-core.workspace = true
stepflow-plugin.workspace = true
tokio = { workspace = true, features = ["test-util"] }
tokio-stream.workspace = true
tonic = { version = "0.14", features = ["transport"] }

[build-dependencies]
tonic-rest-build = "0.1.5"
built = { version = "0.7", features = ["git2"] }

[lints]
workspace = true

[package.metadata.cargo-machete]
# tonic-rest: used in generated REST route code loaded via include!().
# built/tonic-rest-build: build-time deps used in build.rs.
ignored = ["tonic-rest", "built", "tonic-rest-build"]
