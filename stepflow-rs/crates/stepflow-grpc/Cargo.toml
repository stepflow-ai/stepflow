[package]
name = "stepflow-grpc"
description = "gRPC protocol definitions and services for Stepflow"
version.workspace = true
edition.workspace = true
authors.workspace = true
license.workspace = true
homepage.workspace = true
repository.workspace = true

[dependencies]
axum.workspace = true
chrono.workspace = true
error-stack.workspace = true
fastrace.workspace = true
futures.workspace = true
log.workspace = true
prost = "0.14"
prost-types = "0.14"
prost-wkt-types = "0.7"
schemars.workspace = true
serde = { version = "1", features = ["derive"] }
dashmap.workspace = true
serde_json.workspace = true
stepflow-analysis.workspace = true
stepflow-core.workspace = true
stepflow-observability.workspace = true
stepflow-dtos.workspace = true
stepflow-execution.workspace = true
stepflow-plugin.workspace = true
stepflow-state.workspace = true
tokio.workspace = true
tokio-stream.workspace = true
tokio-util = { workspace = true, features = ["time"] }
tonic = { version = "0.14", features = ["transport"] }
tonic-prost = "0.14"
tonic-types = "0.14"
tonic-rest = "0.1.5"
uuid.workspace = true

[target.'cfg(unix)'.dependencies]
nix.workspace = true

[dev-dependencies]
prost-wkt-types = "0.7"
serde_json.workspace = true
stepflow-core.workspace = true
stepflow-plugin.workspace = true
tokio = { workspace = true, features = ["test-util"] }
tonic = { version = "0.14", features = ["transport"] }

[build-dependencies]
tonic-prost-build = "0.14"
tonic-rest-build = "0.1.5"
prost-build = "0.14"
built = { version = "0.7", features = ["git2"] }

[lints]
workspace = true

[package.metadata.cargo-machete]
# prost/tonic-prost/tonic-rest: used in protobuf-generated code loaded via include!() —
#   machete cannot see through macros.
# built/prost-build/tonic-prost-build/tonic-rest-build: build-time deps used in build.rs —
#   machete does not verify build script usage.
ignored = ["prost", "prost-types", "tonic-prost", "tonic-rest", "built", "prost-build", "tonic-prost-build", "tonic-rest-build"]
