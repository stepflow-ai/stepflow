syntax = "proto3";

package stepflow.v1;

option go_package = "github.com/datastax/stepflow/proto/stepflow/v1;stepflowv1";

import "google/protobuf/struct.proto";
import "google/protobuf/timestamp.proto";

// =============================================================================
// Observability
// =============================================================================

// Observability context for distributed tracing and logging.
//
// Passed with protocol requests to enable trace correlation and structured
// logging across the Stepflow runtime and component servers.
message ObservabilityContext {
  // OpenTelemetry trace ID (128-bit, hex encoded).
  // Present when tracing is enabled.
  optional string trace_id = 1;

  // OpenTelemetry span ID (64-bit, hex encoded).
  // Component servers should use this as the parent span.
  optional string span_id = 2;

  // The ID of the workflow run (UUID).
  // Present for workflow execution requests, absent for discovery.
  optional string run_id = 3;

  // The ID of the flow being executed (SHA-256 blob hash).
  // Present for workflow execution requests, absent for discovery.
  optional string flow_id = 4;

  // The ID of the step being executed.
  // Present for step-level execution, absent for workflow-level operations.
  optional string step_id = 5;
}

// =============================================================================
// Status enums
// =============================================================================

// Execution status for runs, items, and steps.
enum ExecutionStatus {
  EXECUTION_STATUS_UNSPECIFIED = 0;
  EXECUTION_STATUS_RUNNING = 1;
  EXECUTION_STATUS_COMPLETED = 2;
  EXECUTION_STATUS_FAILED = 3;
  EXECUTION_STATUS_CANCELLED = 4;
  EXECUTION_STATUS_PAUSED = 5;
  EXECUTION_STATUS_RECOVERY_FAILED = 6;
}

// Result ordering for item results.
enum ResultOrder {
  RESULT_ORDER_UNSPECIFIED = 0;
  // Order results by their index in the input array (default).
  RESULT_ORDER_BY_INDEX = 1;
  // Order results by completion time.
  RESULT_ORDER_BY_COMPLETION = 2;
}

// =============================================================================
// Error codes
// =============================================================================

// Error codes for task and step failures.
//
// Each variant encodes retryability semantics:
//   - Always retried (transport): UNREACHABLE, TIMEOUT
//   - Retried with onError policy: COMPONENT_FAILED, RESOURCE_UNAVAILABLE
//   - Never retried: all others
enum TaskErrorCode {
  // Default value; should not be used explicitly.
  TASK_ERROR_CODE_UNSPECIFIED = 0;

  // The task exceeded its execution deadline or heartbeat timeout.
  // Always retried (transport-level).
  TASK_ERROR_CODE_TIMEOUT = 1;

  // The component rejected its input (e.g., missing required fields, schema
  // validation failure). Not retriable without correcting the input.
  TASK_ERROR_CODE_INVALID_INPUT = 2;

  // The component executed but returned a business-logic failure (e.g., an API
  // call returned an error, a transformation produced an invalid result).
  // Retriable with onError: retry policy.
  TASK_ERROR_CODE_COMPONENT_FAILED = 3;

  // The task was explicitly cancelled by the orchestrator (e.g., run
  // cancellation, step timeout policy). Not retriable.
  TASK_ERROR_CODE_CANCELLED = 4;

  // The worker or component could not be reached (e.g., worker disconnected,
  // subprocess crash, network timeout). The component never executed.
  // Always retried (transport-level).
  TASK_ERROR_CODE_UNREACHABLE = 5;

  // The requested component does not exist on the worker (e.g., unknown
  // component name, misconfigured route). Not retriable without fixing the
  // workflow or routing configuration.
  TASK_ERROR_CODE_COMPONENT_NOT_FOUND = 6;

  // A resource required by the component was not available during execution
  // (e.g., external API down, database connection failed).
  // Retriable with onError: retry policy.
  TASK_ERROR_CODE_RESOURCE_UNAVAILABLE = 7;

  // The orchestrator failed to resolve a value expression (e.g., $step
  // reference to unknown step, path to nonexistent field).
  // Not retriable — the flow definition must be corrected.
  TASK_ERROR_CODE_EXPRESSION_FAILURE = 8;

  // Catch-all for unexpected orchestrator errors (e.g., internal state
  // corruption, serialization failure). Not retriable.
  TASK_ERROR_CODE_ORCHESTRATOR_ERROR = 9;

  // Catch-all for unexpected worker/SDK errors (e.g., serialization failure,
  // panic, protocol violation). Not retriable.
  TASK_ERROR_CODE_WORKER_ERROR = 10;
}

// =============================================================================
// Shared types used across services
// =============================================================================

// Aggregate statistics for items in a run.
message ItemStatistics {
  uint32 total = 1;
  uint32 completed = 2;
  uint32 running = 3;
  uint32 failed = 4;
  uint32 cancelled = 5;
}

// Result of a single item in a run.
message ItemResult {
  // Index of this item in the input array (0-based).
  uint32 item_index = 1;

  // Execution status of this item.
  ExecutionStatus status = 2;

  // Result of this item (present when completed successfully).
  optional google.protobuf.Value output = 3;

  // Error message (present when failed).
  optional string error_message = 4;

  // Error code (present when failed).
  optional TaskErrorCode error_code = 5;

  // When this item completed.
  optional google.protobuf.Timestamp completed_at = 6;
}

