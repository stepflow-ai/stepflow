syntax = "proto3";

package stepflow.v1;

option go_package = "github.com/datastax/stepflow/proto/stepflow/v1;stepflowv1";

import "google/api/annotations.proto";
import "google/protobuf/struct.proto";
import "gnostic/openapi/v3/annotations.proto";

// Service for listing registered components across all plugins.
//
// This is the external REST/gRPC API for clients to discover available
// components. It aggregates results from all registered plugins. For the
// internal task dispatch API, see TasksService in tasks.proto.
service ComponentsService {
  // List all available components from registered plugins.
  rpc ListRegisteredComponents(ListRegisteredComponentsRequest)
      returns (ListRegisteredComponentsResponse) {
    option (google.api.http) = {
      get: "/components"
    };
    option (gnostic.openapi.v3.operation) = {
      summary: "List all available components"
      operation_id: "listComponents"
    };
  }
}

message ListRegisteredComponentsRequest {
  // Set to true to exclude input/output schemas from the response.
  // By default (when false or omitted), schemas are included.
  bool exclude_schemas = 1;
}

message ListRegisteredComponentsResponse {
  // All available components, sorted by name.
  // When some plugins fail discovery, this contains components from the
  // plugins that succeeded — check `complete` and `failed_plugins`.
  repeated ComponentInfoEntry components = 1;

  // True if all plugins responded successfully. When false, the component
  // list is partial — see `failed_plugins` for details.
  bool complete = 2;

  // Plugins that failed component discovery (empty when complete is true).
  repeated PluginDiscoveryError failed_plugins = 3;
}

// A plugin that failed during component discovery.
message PluginDiscoveryError {
  // Plugin name from the orchestrator config (e.g., "python", "node").
  string plugin = 1;

  // Human-readable error message.
  string error = 2;
}

// A component registered with the orchestrator.
message ComponentInfoEntry {
  // Component path (e.g., "/builtin/openai", "/python/my_func").
  string component = 1;

  // Optional human-readable description.
  optional string description = 2;

  // JSON Schema for the component's input (null if schemas not requested).
  optional google.protobuf.Struct input_schema = 3;

  // JSON Schema for the component's output (null if schemas not requested).
  optional google.protobuf.Struct output_schema = 4;
}
