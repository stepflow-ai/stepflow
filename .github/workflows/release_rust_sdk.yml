name: Release - Rust SDK

on:
  repository_dispatch:
    types: [build-rust-sdk-release]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., 0.1.0)'
        required: true
        type: string
      skip_tag_creation:
        description: 'Skip creating git tag (for testing)'
        required: false
        type: boolean
        default: false

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  determine-version:
    name: Determine Version
    runs-on: ubuntu-22.04
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
      skip_tag: ${{ steps.version.outputs.skip_tag }}

    steps:
      - name: Set version info
        id: version
        run: |
          if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            echo "version=${{ github.event.client_payload.version }}" >> $GITHUB_OUTPUT
            echo "tag=${{ github.event.client_payload.tag }}" >> $GITHUB_OUTPUT
            echo "skip_tag=false" >> $GITHUB_OUTPUT
            echo "Source: repository dispatch"
            echo "Version: ${{ github.event.client_payload.version }}"
            echo "Tag: ${{ github.event.client_payload.tag }}"
          else
            echo "version=${{ inputs.version }}" >> $GITHUB_OUTPUT
            echo "tag=rust-sdk-${{ inputs.version }}" >> $GITHUB_OUTPUT
            echo "skip_tag=${{ inputs.skip_tag_creation }}" >> $GITHUB_OUTPUT
            echo "Source: manual workflow dispatch"
            echo "Version: ${{ inputs.version }}"
            echo "Tag: rust-sdk-${{ inputs.version }}"
            echo "Skip tag: ${{ inputs.skip_tag_creation }}"
          fi

  build:
    name: Build and Test
    runs-on: ubuntu-22.04
    needs: [determine-version]

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and test
        working-directory: sdks/rust
        run: |
          cargo check --locked
          cargo test

  publish-crates:
    name: Publish Rust SDK Crates to crates.io
    runs-on: ubuntu-22.04
    needs: [determine-version, build]
    if: needs.determine-version.outputs.skip_tag == 'false'
    environment:
      name: crates-io
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Verify version matches Cargo.toml
        working-directory: sdks/rust
        run: |
          CARGO_VERSION=$(grep '^version = ' Cargo.toml | head -1 | sed 's/version = "\(.*\)"/\1/')
          if [ "$CARGO_VERSION" != "${{ needs.determine-version.outputs.version }}" ]; then
            echo "::error::Version mismatch: Cargo.toml has $CARGO_VERSION but release is for ${{ needs.determine-version.outputs.version }}"
            exit 1
          fi

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install cargo-workspaces
        run: cargo install cargo-workspaces

      - name: Authenticate with crates.io
        uses: rust-lang/crates-io-auth-action@v1
        id: crates-io-auth

      - name: Publish crates
        working-directory: sdks/rust
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.crates-io-auth.outputs.token }}
        run: |
          cargo workspaces publish \
            --publish-as-is \
            --skip-published \
            --publish-interval 15 \
            --yes

  create-tag-and-release:
    name: Create Tag and Release
    runs-on: ubuntu-22.04
    needs: [determine-version, publish-crates]
    if: needs.determine-version.outputs.skip_tag == 'false'
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create release notes
        run: |
          cat > release-notes.md << 'NOTES'
          ## Rust SDK Release v${{ needs.determine-version.outputs.version }}

          ### Crates Published

          - [`stepflow-client`](https://crates.io/crates/stepflow-client) — Rust client SDK for flow authoring and run management
          - [`stepflow-worker`](https://crates.io/crates/stepflow-worker) — Rust worker SDK for implementing components

          ### Installation

          ```toml
          [dependencies]
          stepflow-client = "${{ needs.determine-version.outputs.version }}"
          stepflow-worker = "${{ needs.determine-version.outputs.version }}"
          ```
          NOTES

      - name: Create GitHub release with tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ needs.determine-version.outputs.tag }}" \
            --title "Rust SDK v${{ needs.determine-version.outputs.version }}" \
            --notes-file release-notes.md

  summary:
    name: Build Summary
    runs-on: ubuntu-22.04
    needs: [determine-version, build, publish-crates, create-tag-and-release]
    if: always()

    steps:
      - name: Check job results
        run: |
          echo "## Rust SDK Release Summary ${{ needs.determine-version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Component | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----------|--------|" >> $GITHUB_STEP_SUMMARY

          if [ "${{ needs.determine-version.outputs.skip_tag }}" = "false" ]; then
            if [ "${{ needs.publish-crates.result }}" = "success" ]; then
              echo "| crates.io publish | ✅ Success |" >> $GITHUB_STEP_SUMMARY
            elif [ "${{ needs.publish-crates.result }}" = "skipped" ]; then
              echo "| crates.io publish | ⏭️ Skipped |" >> $GITHUB_STEP_SUMMARY
            else
              echo "| crates.io publish | ❌ Failed |" >> $GITHUB_STEP_SUMMARY
            fi

            if [ "${{ needs.create-tag-and-release.result }}" = "success" ]; then
              echo "| GitHub Release | ✅ Success |" >> $GITHUB_STEP_SUMMARY
            elif [ "${{ needs.create-tag-and-release.result }}" = "skipped" ]; then
              echo "| GitHub Release | ⏭️ Skipped |" >> $GITHUB_STEP_SUMMARY
            else
              echo "| GitHub Release | ❌ Failed |" >> $GITHUB_STEP_SUMMARY
            fi
          else
            echo "| crates.io publish | ⏭️ Skipped (testing mode) |" >> $GITHUB_STEP_SUMMARY
            echo "| GitHub Release | ⏭️ Skipped (testing mode) |" >> $GITHUB_STEP_SUMMARY
          fi

          if [ "${{ needs.determine-version.outputs.skip_tag }}" = "false" ] && [ "${{ needs.create-tag-and-release.result }}" = "success" ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### Release Complete" >> $GITHUB_STEP_SUMMARY
            echo "**Tag:** ${{ needs.determine-version.outputs.tag }}" >> $GITHUB_STEP_SUMMARY
            echo "**GitHub Release:** [Rust SDK v${{ needs.determine-version.outputs.version }}](https://github.com/${{ github.repository }}/releases/tag/${{ needs.determine-version.outputs.tag }})" >> $GITHUB_STEP_SUMMARY
            echo "**crates.io:** [stepflow-client](https://crates.io/crates/stepflow-client/${{ needs.determine-version.outputs.version }}) | [stepflow-worker](https://crates.io/crates/stepflow-worker/${{ needs.determine-version.outputs.version }})" >> $GITHUB_STEP_SUMMARY
          fi
