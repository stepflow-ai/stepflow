name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

# Limit concurrency to a single run per branch (ref).
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

# =============================================================================
# CI OPTIMIZATION STRATEGY
# =============================================================================
# This workflow uses path-based filtering to run checks only on changed sub-packages.
# This significantly reduces CI time by avoiding unnecessary work.
#
# APPROACH:
# 1. Use dorny/paths-filter to detect which sub-packages have changes
# 2. Use composite actions (.github/actions/*) to encapsulate package-specific logic
# 3. Run checks conditionally based on detected changes
# 4. Use a final aggregation job to ensure all required checks pass
#
# SUB-PACKAGES:
# - rust: stepflow-rs Rust workspace (crates/*)
# - python: sdks/python Python SDK
# - docs: docs/ Docusaurus documentation site
#
# EXTENDING THIS PATTERN:
# To add new sub-packages:
# 1. Create a new composite action in .github/actions/
# 2. Add path filters below in the 'changes' job
# 3. Add a conditional job that uses the new composite action
# 4. Update the 'check-success' job dependencies
# =============================================================================

jobs:
  # Detect which parts of the codebase have changed
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      rust: ${{ steps.filter.outputs.rust }}
      python: ${{ steps.filter.outputs.python }}
      docs: ${{ steps.filter.outputs.docs }}
      langflow: ${{ steps.filter.outputs.langflow }}
      recovery: ${{ steps.filter.outputs.recovery }}
      docling: ${{ steps.filter.outputs.docling }}
      proto: ${{ steps.filter.outputs.proto }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            rust:
              - '.github/actions/rust-checks/**'
              - 'scripts/check-rust.sh'
              - 'scripts/_lib.sh'
              - 'stepflow-rs/**'
              - 'schemas/**'
            python:
              - '.github/actions/python-checks/**'
              - 'scripts/check-python.sh'
              - 'scripts/_lib.sh'
              - 'sdks/python/**'
              - 'schemas/**'
            docs:
              - '.github/actions/docs-checks/**'
              - 'scripts/check-docs.sh'
              - 'scripts/_lib.sh'
              - 'docs/**'
              - 'README.md'
              - '*.md'
            langflow:
              - '.github/actions/langflow-checks/**'
              - 'scripts/check-langflow.sh'
              - 'scripts/_lib.sh'
              - 'integrations/langflow/**'
              - 'stepflow-rs/**'
              - 'sdks/python/**'
            recovery:
              - '.github/actions/recovery-tests/**'
              - 'scripts/check-recovery.sh'
              - 'scripts/_lib.sh'
              - 'tests/recovery/**'
            docling:
              - '.github/actions/docling-step-worker/**'
              - 'scripts/check-docling.sh'
              - 'scripts/_lib.sh'
              - 'integrations/docling-step-worker/**'
            proto:
              - '.github/actions/proto-checks/**'
              - 'scripts/check-proto.sh'
              - 'scripts/generate-python-proto.sh'
              - 'scripts/_lib.sh'
              - 'stepflow-rs/proto/**'
              - 'sdks/python/stepflow-py/src/stepflow_py/proto/**'
              - 'schemas/openapi.yaml'
              - '.redocly.yaml'

  # Rust checks (combined style, build, and test)
  rust-checks:
    name: Rust Checks
    needs: changes
    if: needs.changes.outputs.rust == 'true'
    strategy:
      fail-fast: true
      matrix:
        include:
          - { os: ubuntu-latest }
          # Additional OS can be added when needed:
          # - { os: macos-latest }
          # - { os: windows-latest }
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/rust-checks

  # Python SDK checks
  python-checks:
    name: Python SDK Checks
    needs: changes
    if: needs.changes.outputs.python == 'true' || needs.changes.outputs.proto == 'true'
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/python-checks
        with:
          python-version: ${{ matrix.python-version }}

  # Documentation build validation
  docs-checks:
    name: Documentation Checks
    needs: changes
    if: needs.changes.outputs.docs == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/docs-checks

  # Proto checks (buf lint, breaking changes, OpenAPI lint)
  proto-checks:
    name: Proto Checks
    needs: changes
    if: needs.changes.outputs.proto == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/proto-checks

  # Langflow integration checks
  langflow-checks:
    name: Langflow Integration Checks
    needs: changes
    if: needs.changes.outputs.langflow == 'true'
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/langflow-checks
        with:
          python-version: ${{ matrix.python-version }}
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}

  # Docling step worker checks
  docling-checks:
    name: Docling Step Worker Checks
    needs: changes
    if: needs.changes.outputs.docling == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/docling-step-worker

  # License header validation (runs on all changes)
  licensure:
    name: License Headers
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install licensure
        uses: taiki-e/install-action@v2
        with:
          tool: licensure
      - name: Check license headers
        shell: bash
        run: ./scripts/check-licenses.sh -v

  # Integration tests (runs workflow execution tests with external dependencies)
  integration-checks:
    name: Integration Tests
    needs: changes
    if: needs.changes.outputs.rust == 'true' || needs.changes.outputs.python == 'true' || needs.changes.outputs.proto == 'true'
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      # Use dtolnay/rust-toolchain (not setup-rust-toolchain) because we
      # configure Swatinem/rust-cache separately with workspaces.
      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Configure Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            ./stepflow-rs
      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ github.token }}
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "0.7.5"
          enable-cache: true
      - name: Set up Python ${{ matrix.python-version }}
        shell: bash
        run: uv python install ${{ matrix.python-version }}
        working-directory: sdks/python
      - name: Run integration tests
        shell: bash
        run: ./scripts/test-integration.sh -v

  # Recovery integration tests (Docker Compose with orchestrator crash/recovery)
  recovery-tests:
    name: Recovery Tests
    needs: changes
    if: >-
      needs.changes.outputs.rust == 'true' ||
      needs.changes.outputs.python == 'true' ||
      needs.changes.outputs.recovery == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/recovery-tests

  # Final aggregation job - ensures all required checks pass
  # This job is required by branch protection rules
  check-success:
    name: All Checks Passed
    runs-on: ubuntu-latest
    needs: [changes, rust-checks, python-checks, docs-checks, proto-checks, langflow-checks, docling-checks, licensure, integration-checks, recovery-tests]
    # Always run this job, but fail if any required checks failed
    if: always()
    steps:
      - name: Check all required jobs succeeded
        run: |
          # Check if any required job failed or was cancelled
          if [[ "${{ needs.rust-checks.result }}" == "failure" || "${{ needs.rust-checks.result }}" == "cancelled" ]]; then
            echo "::error::Rust checks failed"
            exit 1
          fi
          if [[ "${{ needs.python-checks.result }}" == "failure" || "${{ needs.python-checks.result }}" == "cancelled" ]]; then
            echo "::error::Python checks failed"
            exit 1
          fi
          if [[ "${{ needs.docs-checks.result }}" == "failure" || "${{ needs.docs-checks.result }}" == "cancelled" ]]; then
            echo "::error::Documentation checks failed"
            exit 1
          fi
          if [[ "${{ needs.proto-checks.result }}" == "failure" || "${{ needs.proto-checks.result }}" == "cancelled" ]]; then
            echo "::error::Proto checks failed"
            exit 1
          fi
          if [[ "${{ needs.langflow-checks.result }}" == "failure" || "${{ needs.langflow-checks.result }}" == "cancelled" ]]; then
            echo "::error::Langflow integration checks failed"
            exit 1
          fi
          if [[ "${{ needs.docling-checks.result }}" == "failure" || "${{ needs.docling-checks.result }}" == "cancelled" ]]; then
            echo "::error::Docling step worker checks failed"
            exit 1
          fi
          if [[ "${{ needs.licensure.result }}" == "failure" || "${{ needs.licensure.result }}" == "cancelled" ]]; then
            echo "::error::License checks failed"
            exit 1
          fi
          if [[ "${{ needs.integration-checks.result }}" == "failure" || "${{ needs.integration-checks.result }}" == "cancelled" ]]; then
            echo "::error::Integration checks failed"
            exit 1
          fi
          if [[ "${{ needs.recovery-tests.result }}" == "failure" || "${{ needs.recovery-tests.result }}" == "cancelled" ]]; then
            echo "::error::Recovery tests failed"
            exit 1
          fi

          # Check if required jobs were skipped when they should have run
          if [[ "${{ needs.changes.outputs.rust }}" == "true" && "${{ needs.rust-checks.result }}" == "skipped" ]]; then
            echo "::error::Rust changes detected but rust-checks was skipped"
            exit 1
          fi
          if [[ ("${{ needs.changes.outputs.python }}" == "true" || "${{ needs.changes.outputs.proto }}" == "true") && "${{ needs.python-checks.result }}" == "skipped" ]]; then
            echo "::error::Python or proto changes detected but python-checks was skipped"
            exit 1
          fi
          if [[ "${{ needs.changes.outputs.docs }}" == "true" && "${{ needs.docs-checks.result }}" == "skipped" ]]; then
            echo "::error::Documentation changes detected but docs-checks was skipped"
            exit 1
          fi
          if [[ "${{ needs.changes.outputs.proto }}" == "true" && "${{ needs.proto-checks.result }}" == "skipped" ]]; then
            echo "::error::Proto changes detected but proto-checks was skipped"
            exit 1
          fi
          if [[ "${{ needs.changes.outputs.langflow }}" == "true" && "${{ needs.langflow-checks.result }}" == "skipped" ]]; then
            echo "::error::Langflow changes detected but langflow-checks was skipped"
            exit 1
          fi
          if [[ "${{ needs.changes.outputs.docling }}" == "true" && "${{ needs.docling-checks.result }}" == "skipped" ]]; then
            echo "::error::Docling changes detected but docling-checks was skipped"
            exit 1
          fi
          if [[ ("${{ needs.changes.outputs.rust }}" == "true" || "${{ needs.changes.outputs.python }}" == "true" || "${{ needs.changes.outputs.proto }}" == "true") && "${{ needs.integration-checks.result }}" == "skipped" ]]; then
            echo "::error::Rust, Python, or proto changes detected but integration-checks was skipped"
            exit 1
          fi
          if [[ ("${{ needs.changes.outputs.rust }}" == "true" || "${{ needs.changes.outputs.python }}" == "true" || "${{ needs.changes.outputs.recovery }}" == "true") && "${{ needs.recovery-tests.result }}" == "skipped" ]]; then
            echo "::error::Rust, Python, or recovery changes detected but recovery-tests was skipped"
            exit 1
          fi

          echo "✅ All required checks passed!"