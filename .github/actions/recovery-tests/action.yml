name: 'Recovery Tests'
description: 'Build stepflow-server and run Docker Compose recovery integration tests'

# =============================================================================
# RECOVERY INTEGRATION TESTS
# =============================================================================
# This action runs the recovery test suite (tests/recovery/) which validates
# orchestrator crash/recovery, worker crashes, and retry exhaustion using a
# Docker Compose environment with 2 orchestrators, etcd, and a shared SQLite DB.
#
# BUILD STRATEGY:
# We build stepflow-server independently rather than reusing the binary from
# rust-checks via artifacts because this job triggers on tests/recovery/** and
# sdks/python/** changes too — rust-checks may not run in those cases.
# Swatinem/rust-cache shares compiled dependencies across jobs on the same
# branch, so this build is mostly just linking (~30s) when the cache is warm.
#
# CI INTEGRATION:
# - Called from ci.yml when rust, python, or recovery files change
# - Uses shared script logic with scripts/check-recovery.sh
# =============================================================================

runs:
  using: 'composite'
  steps:
    # Use dtolnay/rust-toolchain (not setup-rust-toolchain) because we
    # configure Swatinem/rust-cache separately with workspaces.
    - name: Setup Rust toolchain
      uses: dtolnay/rust-toolchain@stable

    - name: Configure Rust cache
      uses: Swatinem/rust-cache@v2
      with:
        workspaces: |
          ./stepflow-rs

    # Install protoc for etcd-client compilation (needed by stepflow-server)
    - name: Install protoc
      uses: arduino/setup-protoc@v3
      with:
        repo-token: ${{ github.token }}

    - name: Install uv
      uses: astral-sh/setup-uv@v5
      with:
        version: "0.7.5"
        enable-cache: true

    - name: Set up Python
      shell: bash
      run: uv python install
      working-directory: tests/recovery

    - name: Run recovery tests
      shell: bash
      run: ./scripts/check-recovery.sh -v
