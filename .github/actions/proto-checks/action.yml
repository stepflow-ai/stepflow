name: 'Proto Checks'
description: 'Validate Protocol Buffer definitions with buf'

runs:
  using: 'composite'
  steps:
    - name: Install buf
      uses: bufbuild/buf-action@v1
      with:
        setup_only: true

    - name: Install uv
      uses: astral-sh/setup-uv@v5
      with:
        version: '0.7.5'
        enable-cache: true

    - name: Set up Python
      shell: bash
      run: uv python install 3.13
      working-directory: sdks/python

    # Run proto checks using the shared script
    - name: Run proto checks
      shell: bash
      run: ./scripts/check-proto.sh -v
