# Production Configuration for Model Serving Demo
#
# This configuration demonstrates production deployment with pull-based
# gRPC transport where workers connect to the orchestrator and pull tasks
# from named queues. This setup provides:
#
# 1. **Horizontal Scalability**: Each model server can be scaled independently
#    based on demand and workload characteristics
# 2. **Resource Optimization**: Text and vision models can run on different
#    hardware (CPU vs GPU instances) for cost efficiency
# 3. **High Availability**: Workers automatically reconnect and pull tasks,
#    with heartbeat-based liveness detection for fault tolerance
# 4. **Independent Deployment**: Model servers can be updated and deployed
#    independently without affecting the workflow runtime
# 5. **No Load Balancer Required**: The orchestrator manages task distribution
#    directly via gRPC queues, simplifying infrastructure

plugins:
  # Built-in components for core Stepflow functionality
  builtin:
    type: builtin

  # Text Models Server Cluster - pull-based gRPC transport
  # In production, text model workers connect to this queue and pull tasks.
  # Workers can run on CPU-optimized nodes and scale independently.
  text_models_cluster:
    type: pull
    queueName: text_models
    # Workers connect to the orchestrator's gRPC service and pull tasks
    # No load balancer needed - the orchestrator manages task distribution

  # Vision Models Server Cluster - pull-based gRPC transport
  # Vision model workers connect to this queue, typically running on
  # GPU-enabled instances optimized for computer vision workloads.
  vision_models_cluster:
    type: pull
    queueName: vision_models
    # Workers run on GPU instances (e.g., AWS p3, GCP n1-gpu)
    # and pull tasks from this queue

routes:
  # Route text processing to dedicated text model queue
  # Workers on CPU-optimized nodes pull tasks from the text_models queue
  "/models/text/{*component}":
    - plugin: text_models_cluster

  # Route vision processing to dedicated vision model queue
  # Workers on GPU-enabled nodes pull tasks from the vision_models queue
  "/models/vision/{*component}":
    - plugin: vision_models_cluster

  # Route basic Python requests to the text models queue
  # We could have a separate queue for Python components if needed.
  "/python/{*component}":
    - plugin: text_models_cluster

  # Fallback to built-in components for core workflow functionality
  "/{*component}":
    - plugin: builtin

# Production state store - using managed database service
# In real production, this might be:
# - PostgreSQL RDS/Cloud SQL for transactional workloads
# - DynamoDB/Firestore for serverless architectures
# - Redis Cluster for high-throughput caching
storageConfig:
  type: sqlite
  databaseUrl: "sqlite:/tmp/prod_workflow_state.db?mode=rwc"
  autoMigrate: true
  maxConnections: 20  # Higher connection pool for production load

# Production considerations not shown in this demo config:
#
# 1. **Authentication & Authorization**:
#    - API keys, OAuth tokens, or mutual TLS for service-to-service auth
#    - Role-based access control for different model tiers
#
# 2. **Observability & Monitoring**:
#    - Prometheus metrics collection from model servers
#    - Distributed tracing across workflow execution and model calls
#    - Structured logging with correlation IDs
#
# 3. **Error Handling & Circuit Breakers**:
#    - Retry policies with exponential backoff
#    - Circuit breakers to prevent cascading failures
#    - Graceful degradation to fallback models
#
# 4. **Resource Management**:
#    - Auto-scaling policies based on queue depth and latency
#    - Resource quotas and rate limiting per tenant/user
#    - Model warming strategies to reduce cold start latency
#
# 5. **Security**:
#    - Network policies and VPC isolation
#    - Secrets management for model credentials
#    - Input validation and sanitization