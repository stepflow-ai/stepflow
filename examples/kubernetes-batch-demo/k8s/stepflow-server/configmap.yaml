apiVersion: v1
kind: ConfigMap
metadata:
  name: stepflow-server-config
  namespace: stepflow-demo
  labels:
    app: stepflow-server
    component: runtime
data:
  stepflow-config.yml: |
    # Stepflow Runtime Configuration for Kubernetes
    #
    # This configuration routes component execution to k8s pods through Pingora

    plugins:
      # Built-in components for core Stepflow functionality
      builtin:
        type: builtin

      # Kubernetes components via pull-based gRPC transport
      # Workers connect to the orchestrator and pull tasks from this queue
      k8s_components:
        type: grpc
        queueName: k8s_components

    routes:
      # Route all /python/* components to the k8s_components queue
      # Workers pull tasks from this queue via gRPC
      "/python":
        - plugin: k8s_components

      # Fallback to built-in components
      "/":
        - plugin: builtin

    # In-memory state store (single-instance runtime)
    storageConfig:
      type: inMemory
