plugins:
  builtin:
    type: builtin
  python:
    type: grpc
    command: uv
    args: ["--project", "../../sdks/python/stepflow-py", "run", "stepflow_worker"]
    queueName: python
  langchain:
    type: grpc
    command: uv
    args: ["--project", "../../sdks/python/stepflow-py", "run", "python", "langchain_server.py"]
    queueName: langchain
    env:
      PYTHONPATH: "${PYTHONPATH:-}:../../sdks/python/src"

routes:
  # Route builtin components directly to builtin plugin
  "/builtin":
    - plugin: builtin
  "/python":
    - plugin: python
  # Route all other components to langchain plugin first, then fallback to builtin
  "/":
    - plugin: langchain
    - plugin: builtin

storageConfig:
  type: inMemory