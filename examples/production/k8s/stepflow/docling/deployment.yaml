# Docling Worker Deployment — gRPC Pull-Based
# Single-container pod that connects to the orchestrator's TasksService and
# pulls tasks from the "docling" queue. No exposed ports — worker is a client.
#
# Architecture:
#   docling-worker ──gRPC PullTasks──▶ stepflow-server:7840

apiVersion: apps/v1
kind: Deployment
metadata:
  name: docling-worker
  namespace: stepflow
  labels:
    app: docling-worker
    component: document-processing
spec:
  replicas: 1
  selector:
    matchLabels:
      app: docling-worker
  template:
    metadata:
      labels:
        app: docling-worker
        component: document-processing
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001  # Matches docling base image UID
      containers:
      - name: docling-proto-step-worker
        image: localhost/stepflow-docling-proto-worker:latest
        imagePullPolicy: Never  # Use local image loaded into Kind
        securityContext:
          allowPrivilegeEscalation: false
        # No ports — gRPC worker is a client
        env:
        # Transport selection
        - name: STEPFLOW_TRANSPORT
          value: "grpc"
        # gRPC TasksService address (v0.13.0: HTTP+gRPC share port 7840)
        - name: STEPFLOW_TASKS_URL
          value: "stepflow-server:7840"
        # Queue name matching orchestrator plugin config
        - name: STEPFLOW_QUEUE_NAME
          value: "docling"
        # Max concurrent task executions per pod (docling is CPU-heavy)
        - name: STEPFLOW_MAX_CONCURRENT
          value: "1"
        # Thread contention prevention
        - name: OMP_NUM_THREADS
          value: "4"
        # Blob store — explicit URL so workers can resolve $blob refs
        - name: STEPFLOW_BLOB_API_URL
          value: "http://stepflow-server:7840/api/v1/blobs"
        # Pod metadata
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: POD_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        # Stepflow logging
        - name: STEPFLOW_LOG_LEVEL
          value: "debug"
        - name: STEPFLOW_LOG_DESTINATION
          value: "stderr,otlp"
        - name: STEPFLOW_SERVICE_NAME
          value: "docling-worker"
        - name: STEPFLOW_TRACE_ENABLED
          value: "true"
        # OpenTelemetry
        - name: STEPFLOW_OTLP_ENDPOINT
          value: "http://otel-collector.stepflow-o11y.svc.cluster.local:4317"
        - name: OTEL_SERVICE_NAME
          value: "docling-worker"
        - name: OTEL_PYTHON_LOGGING_AUTO_INSTRUMENTATION_ENABLED
          value: "true"
        - name: OTEL_RESOURCE_ATTRIBUTES
          value: "deployment.environment=kubernetes,service.namespace=stepflow,service.instance.id=$(POD_NAME),k8s.pod.name=$(POD_NAME),k8s.namespace.name=$(POD_NAMESPACE)"
        resources:
          requests:
            cpu: 1000m
            memory: 2Gi
          limits:
            cpu: 4000m
            memory: 4Gi
        # File-based probes — gRPC worker has no HTTP server.
        # The warm-up step in server.py touches /tmp/worker-ready once
        # DocumentConverter models are loaded.
        startupProbe:
          exec:
            command: ["test", "-f", "/tmp/worker-ready"]
          initialDelaySeconds: 10
          periodSeconds: 5
          failureThreshold: 30
        livenessProbe:
          exec:
            command: ["test", "-f", "/tmp/worker-ready"]
          periodSeconds: 30
        readinessProbe:
          exec:
            command: ["test", "-f", "/tmp/worker-ready"]
          periodSeconds: 10
