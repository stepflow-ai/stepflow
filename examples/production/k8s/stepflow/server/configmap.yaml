apiVersion: v1
kind: ConfigMap
metadata:
  name: stepflow-server-config
  namespace: stepflow
  labels:
    app: stepflow-server
    component: orchestration
data:
  stepflow-config.yml: |
    # Stepflow Configuration for Kubernetes Deployment
    # Routes component execution to appropriate backend services

    plugins:
      # Built-in components (OpenAI, eval, etc.)
      builtin:
        type: builtin

      # Langflow components via pull-based gRPC transport
      # Langflow workers connect to the orchestrator and pull tasks from this queue
      langflow_k8s:
        type: grpc
        queueName: langflow

      # Docling components via pull-based gRPC transport
      # Docling workers connect to the orchestrator and pull tasks from this queue
      docling_k8s:
        type: grpc
        queueName: docling

    routes:
      # Route docling components to dedicated docling-worker
      # Components: DoclingInlineComponent, DoclingRemoteComponent,
      #             ChunkDoclingDocument, ExportDoclingDocument
      "/docling":
        - plugin: docling_k8s

      # Route lfx docling components (from known_components.py) to docling-worker
      # These paths come from workflows converted with known component mappings
      "/langflow/core/lfx/components/docling":
        - plugin: docling_k8s

      # Route all other /langflow/* components to Kubernetes cluster
      "/langflow":
        - plugin: langflow_k8s

      # Route builtin components explicitly
      "/builtin":
        - plugin: builtin

    # State store configuration (using in-memory for demo)
    storageConfig:
      type: inMemory
