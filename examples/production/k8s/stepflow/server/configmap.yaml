apiVersion: v1
kind: ConfigMap
metadata:
  name: stepflow-server-config
  namespace: stepflow
  labels:
    app: stepflow-server
    component: orchestration
data:
  stepflow-config.yml: |
    # Stepflow Configuration for Kubernetes Deployment
    # Routes component execution to appropriate backend services

    plugins:
      # Built-in components (OpenAI, eval, etc.)
      builtin:
        type: builtin

      # Langflow components via pull-based gRPC transport
      # Langflow workers connect to the orchestrator and pull tasks from this queue
      langflow_k8s:
        type: grpc
        # NOTE: queueName must match STEPFLOW_QUEUE_NAME in worker deployment.
        queueName: langflow
        # Langflow components can be slow due to LLM API calls.
        # 300s gives headroom for queue spikes.
        queueTimeoutSecs: 300

      # Docling components via pull-based gRPC transport
      # Docling workers connect to the orchestrator and pull tasks from this queue
      docling_k8s:
        type: grpc
        # NOTE: queueName must match STEPFLOW_QUEUE_NAME in worker deployment.
        queueName: docling
        # Docling steps are CPU-heavy (20-120s each).
        # 300s gives headroom for queue spikes.
        queueTimeoutSecs: 300

    routes:
      # Route docling components to dedicated docling-worker
      # Components: DoclingInlineComponent, DoclingRemoteComponent,
      #             ChunkDoclingDocument, ExportDoclingDocument
      "/docling":
        - plugin: docling_k8s

      # Route all /langflow/* components to Kubernetes cluster
      "/langflow":
        - plugin: langflow_k8s

      # Route builtin components explicitly
      "/builtin":
        - plugin: builtin

    # Blob API URL exposed to workers so they can resolve $blob references.
    # The orchestrator auto-configures to 127.0.0.1 which is unreachable from
    # worker pods; this overrides it with the cluster-internal service address.
    blobApi:
      url: "http://stepflow-server:7840/api/v1/blobs"

    storageConfig:
      type: sqlite
      databaseUrl: "sqlite:/data/stepflow.db?mode=rwc"

    retry:
      transportMaxRetries: 60
      backoff:
        type: fibonacci
        minDelayMs: 2000
        maxDelayMs: 15000
