# Langflow Worker Deployment — gRPC Pull-Based
# Single-container pod that connects to the orchestrator's TasksService and
# pulls tasks from the "langflow" queue. No exposed ports — worker is a client.
#
# Architecture:
#   langflow-worker ──gRPC PullTasks──▶ stepflow-server:7840

apiVersion: apps/v1
kind: Deployment
metadata:
  name: langflow-worker
  namespace: stepflow
  labels:
    app: langflow-worker
    component: langflow-integration
spec:
  replicas: 2
  selector:
    matchLabels:
      app: langflow-worker
  template:
    metadata:
      labels:
        app: langflow-worker
        component: langflow-integration
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
      containers:
      - name: langflow-worker
        image: localhost/langflow-worker:latest
        imagePullPolicy: Never  # Use local image loaded into Kind
        securityContext:
          allowPrivilegeEscalation: false
        # No ports — gRPC worker is a client
        env:
        # Transport selection
        - name: STEPFLOW_TRANSPORT
          value: "grpc"
        # gRPC TasksService address (v0.13.0: HTTP+gRPC share port 7840)
        - name: STEPFLOW_TASKS_URL
          value: "stepflow-server:7840"
        # Queue name matching orchestrator plugin config
        - name: STEPFLOW_QUEUE_NAME
          value: "langflow"
        # Max concurrent task executions per pod
        - name: STEPFLOW_MAX_CONCURRENT
          value: "4"
        # Blob store — explicit URL so workers can resolve $blob refs
        - name: STEPFLOW_BLOB_API_URL
          value: "http://stepflow-server:7840/api/v1/blobs"
        # Pod metadata
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: POD_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        - name: POD_IP
          valueFrom:
            fieldRef:
              fieldPath: status.podIP
        # API keys from secrets
        - name: OPENAI_API_KEY
          valueFrom:
            secretKeyRef:
              name: stepflow-secrets
              key: openai-api-key
              optional: true
        - name: LANGFLOW_API_KEY
          valueFrom:
            secretKeyRef:
              name: stepflow-secrets
              key: langflow-api-key
              optional: true
        # OpenSearch connection
        - name: OPENSEARCH_HOST
          value: "opensearch.stepflow.svc.cluster.local"
        - name: OPENSEARCH_PORT
          value: "9200"
        - name: OPENSEARCH_USERNAME
          valueFrom:
            secretKeyRef:
              name: stepflow-secrets
              key: opensearch-username
              optional: true
        - name: OPENSEARCH_PASSWORD
          valueFrom:
            secretKeyRef:
              name: stepflow-secrets
              key: opensearch-password
              optional: true
        - name: OPENSEARCH_MAX_CONNECTIONS
          value: "20"
        - name: PYTHONUNBUFFERED
          value: "1"
        # Stepflow logging configuration
        - name: STEPFLOW_LOG_LEVEL
          value: "debug"
        - name: STEPFLOW_LOG_DESTINATION
          value: "stderr,otlp"
        - name: STEPFLOW_SERVICE_NAME
          value: "langflow-worker"
        - name: STEPFLOW_TRACE_ENABLED
          value: "true"
        # OpenTelemetry configuration
        - name: STEPFLOW_OTLP_ENDPOINT
          value: "http://otel-collector.stepflow-o11y.svc.cluster.local:4317"
        - name: OTEL_SERVICE_NAME
          value: "langflow-worker"
        - name: OTEL_RESOURCE_ATTRIBUTES
          value: "deployment.environment=kubernetes,service.namespace=stepflow,service.instance.id=$(POD_NAME),k8s.pod.name=$(POD_NAME),k8s.namespace.name=$(POD_NAMESPACE)"
        - name: OTEL_PYTHON_LOGGING_AUTO_INSTRUMENTATION_ENABLED
          value: "true"
        # Workflow configuration variables (for SecretInput components)
        - name: CONNECTOR_TYPE
          value: "wikipedia"
        - name: OWNER
          value: "stepflow-demo"
        - name: OWNER_NAME
          value: "Stepflow Demo"
        - name: OWNER_EMAIL
          value: "demo@stepflow.ai"
        resources:
          requests:
            cpu: 200m
            memory: 512Mi
          limits:
            cpu: 1000m
            memory: 1Gi
        # File-based probes — gRPC worker has no HTTP server.
        # standalone_server.py touches /tmp/worker-ready after initialization.
        startupProbe:
          exec:
            command: ["test", "-f", "/tmp/worker-ready"]
          initialDelaySeconds: 10
          periodSeconds: 5
          failureThreshold: 30
        livenessProbe:
          exec:
            command: ["test", "-f", "/tmp/worker-ready"]
          periodSeconds: 30
        readinessProbe:
          exec:
            command: ["test", "-f", "/tmp/worker-ready"]
          periodSeconds: 10
