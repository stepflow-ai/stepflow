# Orchestrator pod: docling-facade (port 5001) + stepflow-server (port 7840 + gRPC 7837)
# The facade presents a docling-serve compatible API and delegates to the
# co-located stepflow-server via localhost.
#
# No init container — orchestrator starts first; workers connect later via gRPC.
#
# PREREQUISITE: The Rust gRPC server must bind 0.0.0.0:7837 for external workers.
# Set STEPFLOW_GRPC_BIND_ADDRESS=0.0.0.0:7837 or equivalent configuration.

apiVersion: apps/v1
kind: Deployment
metadata:
  name: docling-orchestrator
  namespace: stepflow-docling-grpc
  labels:
    app: docling-orchestrator
    component: orchestration
spec:
  replicas: 1
  selector:
    matchLabels:
      app: docling-orchestrator
  template:
    metadata:
      labels:
        app: docling-orchestrator
        component: orchestration
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
      volumes:
      - name: config
        configMap:
          name: docling-orchestrator-config
      # No init container — workers connect to orchestrator, not the other way around
      containers:
      # Container 1: docling-facade — docling-serve compatible HTTP API
      - name: docling-facade
        image: localhost/docling-facade:grpc-v1
        imagePullPolicy: Never
        securityContext:
          allowPrivilegeEscalation: false
        ports:
        - name: facade
          containerPort: 5001
          protocol: TCP
        env:
        - name: STEPFLOW_SERVER_URL
          value: "http://localhost:7840"
        - name: STEPFLOW_FLOW_PATH
          value: "/app/config/docling-process-document.yaml"
        - name: FACADE_PORT
          value: "5001"
        # Pod metadata
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: POD_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        # OTEL configuration
        - name: OTEL_SERVICE_NAME
          value: "docling-facade"
        - name: OTEL_RESOURCE_ATTRIBUTES
          value: "deployment.environment=kubernetes,service.namespace=stepflow-docling-grpc,service.instance.id=$(POD_NAME),k8s.pod.name=$(POD_NAME),k8s.namespace.name=$(POD_NAMESPACE)"
        volumeMounts:
        - name: config
          mountPath: /app/config
          readOnly: true
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 256Mi
        livenessProbe:
          httpGet:
            path: /health
            port: facade
          initialDelaySeconds: 10
          periodSeconds: 30
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: facade
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3

      # Container 2: stepflow-server — Rust orchestrator with gRPC TasksService
      - name: stepflow-server
        image: localhost/stepflow-server:alpine-0.10.0
        imagePullPolicy: Never
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
        command: ["stepflow-server"]
        args: ["--port", "7840", "--config", "/app/config/stepflow-config.yml"]
        ports:
        - name: http
          containerPort: 7840
          protocol: TCP
        - name: grpc
          containerPort: 7837
          protocol: TCP
        env:
        # gRPC bind address — must be 0.0.0.0 for external worker pods
        - name: STEPFLOW_GRPC_BIND_ADDRESS
          value: "0.0.0.0:7837"
        # Advertised gRPC URL for workers to call back (service DNS, not bind address)
        - name: STEPFLOW_ORCHESTRATOR_GRPC_URL
          value: "docling-orchestrator.stepflow-docling-grpc.svc.cluster.local:7837"
        # Pod metadata
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: POD_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        # Stepflow logging
        - name: STEPFLOW_LOG_LEVEL
          value: "debug"
        - name: STEPFLOW_OTHER_LOG_LEVEL
          value: "warn"
        - name: STEPFLOW_LOG_FORMAT
          value: "json"
        # Stepflow OTLP
        - name: STEPFLOW_OTLP_ENDPOINT
          value: "http://otel-collector.stepflow-o11y.svc.cluster.local:4317"
        - name: STEPFLOW_TRACE_ENABLED
          value: "true"
        - name: STEPFLOW_METRICS_ENABLED
          value: "true"
        # Standard OTEL
        - name: OTEL_SERVICE_NAME
          value: "stepflow-server"
        - name: OTEL_RESOURCE_ATTRIBUTES
          value: "deployment.environment=kubernetes,service.namespace=stepflow-docling-grpc,service.instance.id=$(POD_NAME),k8s.pod.name=$(POD_NAME),k8s.namespace.name=$(POD_NAMESPACE)"
        volumeMounts:
        - name: config
          mountPath: /app/config
          readOnly: true
        resources:
          requests:
            cpu: 200m
            memory: 256Mi
          limits:
            cpu: 1000m
            memory: 512Mi
        livenessProbe:
          httpGet:
            path: /api/v1/health
            port: http
          initialDelaySeconds: 10
          periodSeconds: 30
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /api/v1/health
            port: http
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
