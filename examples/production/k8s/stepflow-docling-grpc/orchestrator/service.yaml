# Orchestrator service — exposes facade (5001), HTTP API (7840), and gRPC (7837).
# NodePort 30080 maps to facade port for kind cluster access.
# gRPC port 7837 exposed as ClusterIP for worker pods to connect.

apiVersion: v1
kind: Service
metadata:
  name: docling-orchestrator
  namespace: stepflow-docling-grpc
  labels:
    app: docling-orchestrator
    component: orchestration
spec:
  type: NodePort
  selector:
    app: docling-orchestrator
  ports:
  - name: facade
    port: 5001
    targetPort: facade
    protocol: TCP
    nodePort: 30080
  - name: http
    port: 7840
    targetPort: http
    protocol: TCP
  - name: grpc
    port: 7837
    targetPort: grpc
    protocol: TCP
  sessionAffinity: None
