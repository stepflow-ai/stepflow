apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: stepflow-o11y
data:
  prometheus.yml: |
    # Prometheus configuration for Stepflow observability

    global:
      scrape_interval: 15s      # How frequently to scrape targets
      evaluation_interval: 15s  # How frequently to evaluate rules
      external_labels:
        cluster: 'stepflow-kind'
        environment: 'development'

    scrape_configs:
      # Scrape Prometheus itself
      - job_name: 'prometheus'
        static_configs:
          - targets: ['localhost:9090']
            labels:
              component: 'prometheus'

      # Scrape OpenTelemetry Collector's own metrics
      - job_name: 'otel-collector'
        static_configs:
          - targets: ['otel-collector:8888']
            labels:
              component: 'otel-collector'

      # Scrape metrics from OpenTelemetry Collector's Prometheus exporter
      # This is where Stepflow application metrics will appear
      - job_name: 'stepflow-via-otel'
        static_configs:
          - targets: ['otel-collector:8889']
            labels:
              source: 'otlp'

      # Jaeger metrics
      - job_name: 'jaeger'
        static_configs:
          - targets: ['jaeger:14269']
            labels:
              component: 'jaeger'

      # Loki metrics
      - job_name: 'loki'
        static_configs:
          - targets: ['loki:3100']
            labels:
              component: 'loki'

      # Grafana metrics
      - job_name: 'grafana'
        static_configs:
          - targets: ['grafana:3000']
            labels:
              component: 'grafana'

      # Note: stepflow-server exports metrics via OTLP (not Prometheus scrape).
      # Metrics flow: stepflow-server → OTel Collector → prom-exporter (:8889)
      # They are available via the 'stepflow-via-otel' job above.
