# KEDA ScaledObject for docling-worker autoscaling.
# Scales based on 503 (backpressure) rate from the load balancer.
# Requires KEDA and a Prometheus instance in the cluster.

apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: docling-worker-scaler
  namespace: stepflow-docling
  labels:
    app: docling-worker
    component: autoscaling
spec:
  scaleTargetRef:
    name: docling-worker
  minReplicaCount: 2
  maxReplicaCount: 8
  cooldownPeriod: 120
  triggers:
    - type: prometheus
      metadata:
        serverAddress: http://prometheus.stepflow-o11y.svc.cluster.local:9090
        query: rate(stepflow_lb_requests_total{status="503"}[2m])
        threshold: "0.1"
        metricName: docling_worker_backpressure_rate
