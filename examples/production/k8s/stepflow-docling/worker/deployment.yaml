# Docling step worker — runs docling library in-process (no sidecar).
# Registers /classify, /convert, /chunk components.

apiVersion: apps/v1
kind: Deployment
metadata:
  name: docling-worker
  namespace: stepflow-docling
  labels:
    app: docling-worker
    component: document-processing
spec:
  replicas: 1
  selector:
    matchLabels:
      app: docling-worker
  template:
    metadata:
      labels:
        app: docling-worker
        component: document-processing
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
      containers:
      - name: docling-step-worker
        image: localhost/stepflow-docling-worker:o11y-fix-v4
        imagePullPolicy: Never
        securityContext:
          allowPrivilegeEscalation: false
        ports:
        - name: http
          containerPort: 8080
          protocol: TCP
        env:
        # Thread contention prevention
        - name: OMP_NUM_THREADS
          value: "4"
        # Pod metadata
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: POD_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        - name: POD_IP
          valueFrom:
            fieldRef:
              fieldPath: status.podIP
        # Stepflow logging
        - name: STEPFLOW_LOG_LEVEL
          value: "debug"
        - name: STEPFLOW_LOG_DESTINATION
          value: "stderr,otlp"
        - name: STEPFLOW_SERVICE_NAME
          value: "docling-step-worker"
        - name: STEPFLOW_TRACE_ENABLED
          value: "true"
        # Blob store — explicit URL so workers can resolve $blob refs
        # even when the LB proxies the initialization session
        - name: STEPFLOW_BLOB_API_URL
          value: "http://docling-orchestrator.stepflow-docling.svc.cluster.local:7840/api/v1/blobs"
        # OpenTelemetry
        - name: STEPFLOW_OTLP_ENDPOINT
          value: "http://otel-collector.stepflow-o11y.svc.cluster.local:4317"
        - name: OTEL_SERVICE_NAME
          value: "docling-step-worker"
        - name: OTEL_PYTHON_LOGGING_AUTO_INSTRUMENTATION_ENABLED
          value: "true"
        - name: OTEL_PYTHON_FASTAPI_EXCLUDED_URLS
          value: "health"
        - name: OTEL_RESOURCE_ATTRIBUTES
          value: "deployment.environment=kubernetes,service.namespace=stepflow-docling,service.instance.id=$(POD_NAME),k8s.pod.name=$(POD_NAME),k8s.namespace.name=$(POD_NAMESPACE)"
        resources:
          requests:
            cpu: 1000m
            memory: 2Gi
          limits:
            cpu: 4000m
            memory: 4Gi
        livenessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 60
          periodSeconds: 30
          timeoutSeconds: 10
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 10
          failureThreshold: 3
