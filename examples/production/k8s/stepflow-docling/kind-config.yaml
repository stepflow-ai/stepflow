# Kind cluster configuration for the stepflow-docling parity testbed
# Usage: kind create cluster --config kind-config.yaml

kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: stepflow-docling
nodes:
- role: control-plane
  extraPortMappings:
  # Docling facade (docling-serve parity endpoint)
  - containerPort: 30501
    hostPort: 5001
    protocol: TCP
  # Grafana UI
  - containerPort: 30001
    hostPort: 3000
    protocol: TCP
  # Jaeger UI
  - containerPort: 30686
    hostPort: 16686
    protocol: TCP
  # Prometheus UI
  - containerPort: 30090
    hostPort: 9090
    protocol: TCP
