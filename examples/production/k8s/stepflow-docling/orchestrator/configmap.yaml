apiVersion: v1
kind: ConfigMap
metadata:
  name: docling-orchestrator-config
  namespace: stepflow-docling
  labels:
    app: docling-orchestrator
    component: orchestration
data:
  stepflow-config.yml: |
    # Stepflow Configuration for docling parity testbed
    # Minimal config: one plugin, one route

    plugins:
      builtin:
        type: builtin

      docling:
        type: pull
        queueName: docling

    routes:
      "/docling/{*component}":
        - plugin: docling

      "/builtin/{*component}":
        - plugin: builtin

    # Blob API URL exposed to workers so they can resolve $blob references.
    # The orchestrator auto-configures to 127.0.0.1 which is unreachable from
    # worker pods; this overrides it with the cluster-internal service address.
    blobApi:
      url: "http://docling-orchestrator.stepflow-docling.svc.cluster.local:7840/api/v1/blobs"

    storageConfig:
      type: inMemory

    retry:
      transportMaxRetries: 60
      backoff:
        type: fibonacci
        minDelayMs: 2000
        maxDelayMs: 15000

  docling-process-document.yaml: |
    schema: https://stepflow.org/schemas/v1/flow.json
    name: docling-process-document
    description: "Classify, convert, and chunk a document using Docling"

    schemas:
      type: object
      properties:
        input:
          type: object
          required:
            - source
            - source_kind
          properties:
            source:
              type: string
              description: "Document source: blob ref, URL, or base64-encoded content"
            source_kind:
              type: string
              enum: [blob, url, base64]
              description: "How to interpret the source field"
            to_formats:
              type: array
              items:
                type: string
              description: "Export formats: markdown, html, text, json, doctags (default: [markdown])"
            image_export_mode:
              type: string
              enum: [embedded, placeholder, referenced]
              description: "Image reference mode for markdown/html exports (default: embedded)"
            options:
              type: object
              description: "docling-serve compatible conversion options"
              properties:
                to_formats:
                  type: array
                  items:
                    type: string
                image_export_mode:
                  type: string
                do_ocr:
                  type: boolean
                force_ocr:
                  type: boolean
                ocr_engine:
                  type: string
                ocr_lang:
                  type: array
                  items:
                    type: string
                pdf_backend:
                  type: string
                table_mode:
                  type: string
                do_table_structure:
                  type: boolean
                include_images:
                  type: boolean
                images_scale:
                  type: number
                page_range:
                  type: string
                document_timeout:
                  type: number
                abort_on_error:
                  type: boolean
                from_formats:
                  type: array
                  items:
                    type: string
            chunk_options:
              type: object
              description: "Optional chunking configuration"
              properties:
                max_tokens:
                  type: integer
                  description: "Maximum tokens per chunk"
                tokenizer:
                  type: string
                  description: "Tokenizer to use for chunk sizing"
        output:
          type: object
          properties:
            document:
              type: object
              description: "ExportDocumentResponse with rendered content fields (md_content, html_content, etc.)"
            status:
              type: string
              description: "Conversion status (success or failure)"
            errors:
              type: array
              description: "Conversion errors and warnings from the converter"
            processing_time:
              type: number
              description: "Conversion processing time in seconds"
            timings:
              type: object
              description: "Detailed timing breakdown by conversion phase"
            chunks:
              type: array
              description: "Document chunks produced by HybridChunker"
            classification:
              type: object
              description: "Classification result with document type and recommended config"

    steps:
      - id: classify
        component: /docling/classify
        input:
          source: { $input: "source" }
          source_kind: { $input: "source_kind" }

      - id: convert
        component: /docling/convert
        input:
          source: { $input: "source" }
          source_kind: { $input: "source_kind" }
          pipeline_config: { $step: "classify", path: "recommended_config" }
          to_formats: { $input: "to_formats" }
          image_export_mode: { $input: "image_export_mode" }
          options: { $input: "options" }

      - id: chunk
        component: /docling/chunk
        input:
          document: { $step: "convert", path: "document_dict" }
          chunk_options: { $input: "chunk_options" }

    output:
      document: { $step: "convert", path: "document" }
      status: { $step: "convert", path: "status" }
      errors: { $step: "convert", path: "errors" }
      processing_time: { $step: "convert", path: "processing_time" }
      timings: { $step: "convert", path: "timings" }
      chunks: { $step: "chunk", path: "chunks" }
      classification: { $step: "classify" }
