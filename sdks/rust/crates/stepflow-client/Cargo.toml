[package]
name = "stepflow-client"
version.workspace = true
edition.workspace = true
license.workspace = true
authors.workspace = true
repository.workspace = true
homepage.workspace = true
description = "Rust client SDK for the Stepflow orchestrator — flow authoring and run management"

[features]
# Enable LocalOrchestrator for launching a local stepflow binary in tests.
# Requires STEPFLOW_DEV_BINARY env var to be set to the binary path.
local-server = []

[dependencies]
stepflow-flow.workspace = true
stepflow-proto.workspace = true
tokio.workspace = true
tonic.workspace = true
prost-wkt-types.workspace = true
serde.workspace = true
serde_json = { workspace = true, features = ["preserve_order"] }
thiserror.workspace = true
futures.workspace = true
tracing.workspace = true
