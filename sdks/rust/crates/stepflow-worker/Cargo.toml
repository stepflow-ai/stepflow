[package]
name = "stepflow-worker"
version.workspace = true
edition.workspace = true
license.workspace = true
authors.workspace = true
repository.workspace = true
homepage.workspace = true
description = "Rust worker SDK for implementing Stepflow components"

[features]
default = []
nats = ["dep:async-nats"]

[dependencies]
stepflow-proto = { workspace = true, features = ["tokio"] }
async-nats = { version = "0.46", optional = true }
prost.workspace = true
tokio = { workspace = true, features = ["signal"] }
tonic.workspace = true
prost-wkt-types.workspace = true
serde.workspace = true
indexmap = "2"
scc = "2"
serde_json.workspace = true
thiserror.workspace = true
async-trait.workspace = true
futures.workspace = true
tracing.workspace = true
clap.workspace = true
uuid.workspace = true

[dev-dependencies]
stepflow-client = { workspace = true, features = ["local-server"] }
stepflow-flow.workspace = true
tracing-subscriber.workspace = true
testcontainers = "0.27.2"

[[example]]
name = "hello_world"

[[test]]
name = "integration"
path = "tests/integration.rs"

[[test]]
name = "nats_integration"
path = "tests/nats_integration.rs"
required-features = ["nats"]
