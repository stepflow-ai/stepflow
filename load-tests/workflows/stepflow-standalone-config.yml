plugins:
  builtin:
    type: builtin
  python:
    type: grpc
    command: uv
    args: ["--project", "../../sdks/python", "run", "stepflow_worker"]
  custom:
    type: grpc
    command: uv
    args: ["--project", "../../sdks/python", "run", "python", "message_custom_server.py"]

routes:
  "/python/{component}":
    - plugin: python
  "/custom/{component}":
    - plugin: custom
  "/{component}":
    - plugin: builtin

storageConfig:
  type: sqlite
  databaseUrl: "sqlite:///Users/benjamin.chambers/code/stepflow-rs-fixes/load-tests/workflow_state_standalone.db"
  autoMigrate: true