schemas:
  type: object
  properties:
    input:
      type: object
      properties:
        user_data:
          type: object
        processing_config:
          type: object
    output:
      type: object
      properties:
        original_blob_id:
          type: string
        processed_blob_id:
          type: string
        final_result:
          type: object
steps:
- id: store_original_data
  component: /builtin/put_blob
  input:
    data:
      $input: $.user_data
    blob_type: data
- id: create_process_data_blob
  component: /builtin/put_blob
  input:
    data:
      input_schema:
        type: object
        properties:
          blob_id:
            type: string
          config:
            type: object
        required:
        - blob_id
        - config
      code: |
        async def process_data(input, context):
            # Retrieve the original data from blob
            original_data = await context.get_blob(input['blob_id'])

            # Process the data (example: add multiply numbers)
            processed_data = {
                'original': original_data,
                'config': input['config']
            }

            # If original data has numeric values, transform them
            if isinstance(original_data, dict):
                for key, value in original_data.items():
                    if isinstance(value, (int, float)):
                        processed_data[f'{key}_doubled'] = value * 2

            # Store processed data as new blob
            new_blob_id = await context.put_blob(processed_data)

            return {
                'original_blob_id': input['blob_id'],
                'processed_blob_id': new_blob_id,
                'summary': f'Processed {len(original_data)} fields'
            }
        process_data
    blob_type: data
- id: process_blob_data
  component: /python/udf
  input:
    blob_id:
      $step: create_process_data_blob
      path: $.blob_id
    input:
      blob_id:
        $step: store_original_data
        path: $.blob_id
      config:
        $input: $.processing_config
- id: get_final_result
  component: /builtin/get_blob
  input:
    blob_id:
      $step: process_blob_data
      path: $.processed_blob_id
output:
  original_blob_id:
    $step: process_blob_data
    path: $.original_blob_id
  processed_blob_id:
    $step: process_blob_data
    path: $.processed_blob_id
  final_result:
    $step: get_final_result
    path: $.data
test:
  cases:
  - name: alice
    input:
      user_data:
        name: Alice
        age: 30
        score: 85.5
      processing_config:
        mode: standard
        multiplier: 2
    output:
      outcome: success
      result:
        final_result:
          age_doubled: 60
          config:
            mode: standard
            multiplier: 2
          original:
            age: 30
            name: Alice
            score: 85.5
          score_doubled: 171
        original_blob_id: 63594fd7447aa6b7dd3940b06e90bd31452273588ee992cd2fed5de4df13d248
        processed_blob_id: 5880cdd14a1588d5c547167b787d8dd50a7eccab61dc2d6ed71f3684ef2bf506
  - name: widget
    input:
      user_data:
        product: Widget
        price: 19.99
