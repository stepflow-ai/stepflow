plugins:
  builtin:
    type: builtin
  python_grpc:
    type: grpc
    command: uv
    args: ["run", "--project", "../../sdks/python/stepflow-py", "python", "test_worker.py"]
    queueName: python_grpc
routes:
  "/python_grpc/{component}":
    - plugin: python_grpc
  "/builtin/{component}":
    - plugin: builtin
