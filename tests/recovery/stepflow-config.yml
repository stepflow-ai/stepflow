plugins:
  builtin:
    type: builtin
  test-worker:
    type: grpc
    queueName: test-worker
    queueTimeoutSecs: 3

routes:
  "/test":
    - plugin: test-worker
  "/builtin":
    - plugin: builtin
  "/":
    - plugin: builtin

storageConfig:
  type: sqlite
  databaseUrl: "sqlite:data/workflow_state.db?mode=rwc"
  autoMigrate: true
  maxConnections: 5

leaseManager:
  type: etcd
  endpoints:
    - "http://etcd:2379"

recovery:
  enabled: true
  checkIntervalSecs: 3
  leaseTtlSecs: 6
  checkpointInterval: 3

blobApi:
  enabled: false

retry:
  transportMaxRetries: 3
  backoff:
    type: fibonacci
    minDelayMs: 2000
    maxDelayMs: 10000
